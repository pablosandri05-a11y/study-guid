<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a1a18; color: #e0f7f4; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }
    button { cursor: pointer; transition: all 0.2s; font-family: inherit; }
    button:hover:not(:disabled) { filter: brightness(1.15); transform: translateY(-1px); }
    button:disabled { cursor: not-allowed; opacity: 0.45; transform: none !important; filter: none !important; }
    input, textarea { font-family: inherit; color: #e0f7f4; }
    textarea { transition: border-color 0.2s; }
    textarea:focus, input:focus { outline: none; border-color: #2dd4bf !important; box-shadow: 0 0 0 3px rgba(45,212,191,0.12); }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0a1a18; }
    ::-webkit-scrollbar-thumb { background: #1d4a44; border-radius: 4px; }

    .screen { display: none; padding: 24px 16px; min-height: 100vh; }
    .screen.active { display: block; }
    .container { max-width: 820px; margin: 0 auto; }

    /* ── HEADER ── */
    .app-header { text-align: center; margin-bottom: 36px; }
    .app-title {
      font-size: 32px; font-weight: 700;
      background: linear-gradient(90deg, #2dd4bf, #5eead4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .app-sub { color: #2d6b63; font-family: 'JetBrains Mono', monospace; font-size: 11px; margin-top: 6px; letter-spacing: 1.5px; }

    /* ── BUTTONS ── */
    .btn { border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 600; border: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn-teal { background: linear-gradient(135deg, #0d9488, #14b8a6); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid #1d4a44; color: #5eead4; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
    .btn-outline:hover:not(:disabled) { border-color: #2dd4bf; background: #0d2420; transform: translateY(-1px); }
    .btn-ghost { background: transparent; border: 1px solid #1d3a35; color: #7eb8b0; font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 8px 14px; }
    .btn-ghost:hover:not(:disabled) { border-color: #2dd4bf; color: #e0f7f4; transform: translateY(-1px); }
    .btn-danger { background: linear-gradient(135deg, #991b1b, #b91c1c); color: #fff; font-size: 12px; padding: 7px 14px; }
    .btn-full { width: 100%; justify-content: center; padding: 14px; font-size: 15px; }
    .btn-gen { background: linear-gradient(135deg, #0d9488, #0891b2); color: #fff; font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: bold; }
    .btn-gen.loading { background: linear-gradient(135deg, #134e4a, #0c4a6e); }

    /* ── CARDS ── */
    .card { background: #0d2420; border: 1px solid #1a3a35; border-radius: 16px; padding: 20px; }

    /* ── PROJECTS ── */
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-top: 20px; }
    .project-card { background: #0d2420; border: 1px solid #1a3a35; border-radius: 16px; padding: 20px; cursor: pointer; transition: all 0.2s; }
    .project-card:hover { border-color: #2dd4bf; transform: translateY(-2px); box-shadow: 0 4px 20px rgba(45,212,191,0.1); }
    .project-card-name { font-size: 18px; font-weight: 700; color: #e0f7f4; margin-bottom: 10px; }
    .project-card-meta { display: flex; gap: 10px; flex-wrap: wrap; }
    .proj-badge { font-family: 'JetBrains Mono', monospace; font-size: 11px; background: #112e28; border: 1px solid #1d4a44; border-radius: 6px; padding: 3px 8px; color: #5eead4; }
    .project-card-date { font-size: 11px; color: #2d6b63; font-family: 'JetBrains Mono', monospace; margin-top: 10px; }
    .new-proj-card { background: #0d2420; border: 2px dashed #1d4a44; border-radius: 16px; padding: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; color: #2d6b63; font-family: 'JetBrains Mono', monospace; font-size: 14px; transition: all 0.2s; min-height: 120px; }
    .new-proj-card:hover { border-color: #2dd4bf; color: #2dd4bf; transform: translateY(-2px); filter: none; }

    /* ── PROJECT TOPBAR ── */
    .proj-topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .proj-title { font-size: 22px; font-weight: 700; color: #e0f7f4; flex: 1; }

    /* ── TABS ── */
    .tab-bar-wrap { overflow-x: auto; margin-bottom: 20px; -webkit-overflow-scrolling: touch; }
    .tab-bar { display: flex; gap: 4px; background: #0d2420; padding: 5px; border-radius: 14px; border: 1px solid #1a3a35; min-width: max-content; }
    .tab-btn { padding: 9px 13px; border-radius: 10px; border: none; font-family: 'JetBrains Mono', monospace; font-size: 11px; background: transparent; color: #2d6b63; white-space: nowrap; }
    .tab-btn.active { background: linear-gradient(135deg, #0d9488, #14b8a6); color: #fff; font-weight: bold; }
    .tab-btn:hover:not(.active):not(:disabled) { color: #5eead4; background: #112e28; transform: none; filter: none; }

    /* ── CONTENT ── */
    .content-panel { background: #0d2420; border-radius: 16px; padding: 24px; border: 1px solid #1a3a35; min-height: 300px; }

    /* ── INPUTS ── */
    .input-field { width: 100%; background: #0a1a18; border: 1px solid #1d4a44; border-radius: 10px; padding: 12px 14px; color: #e0f7f4; font-size: 14px; }
    textarea.input-field { resize: vertical; line-height: 1.65; }
    .lbl { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #2d6b63; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; display: block; }
    .api-row { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }
    .api-row label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #2d6b63; white-space: nowrap; letter-spacing: 1px; }
    .api-row input { flex: 1; background: #0a1a18; border: 1px solid #1d4a44; border-radius: 8px; padding: 8px 12px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #e0f7f4; }

    /* ── ERROR ── */
    .error-box { color: #fca5a5; font-family: 'JetBrains Mono', monospace; font-size: 12px; margin-top: 10px; padding: 10px 14px; background: #1a0505; border-radius: 8px; border: 1px solid #7f1d1d; }

    /* ── STATS ── */
    .stats-bar { display: flex; gap: 10px; margin-top: 16px; justify-content: center; flex-wrap: wrap; }
    .stat-item { text-align: center; padding: 8px 16px; background: #0a1a18; border-radius: 8px; border: 1px solid #1d4a44; }
    .stat-val { font-size: 18px; font-weight: bold; color: #2dd4bf; font-family: 'JetBrains Mono', monospace; }
    .stat-lbl { font-size: 10px; color: #2d6b63; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 1px; }

    /* ── FLASHCARD ── */
    .fc-counter { text-align: center; margin-bottom: 16px; color: #2d6b63; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
    .flashcard { cursor: pointer; min-height: 200px; display: flex; align-items: center; justify-content: center; border-radius: 16px; padding: 32px; text-align: center; transition: all 0.3s ease; }
    .flashcard.front { background: linear-gradient(135deg, #0a1a18, #112e28); border: 1.5px solid #0d9488; }
    .flashcard.back  { background: linear-gradient(135deg, #0c2a24, #0c4a38); border: 1.5px solid #2dd4bf; }
    .fc-hint { font-size: 11px; color: #2d6b63; font-family: 'JetBrains Mono', monospace; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 2px; }
    .fc-text { font-size: 19px; color: #e0f7f4; line-height: 1.5; }
    .fc-nav { display: flex; justify-content: center; gap: 12px; margin-top: 20px; }
    .dots { display: flex; justify-content: center; gap: 6px; margin-top: 16px; flex-wrap: wrap; }
    .dot { width: 8px; height: 8px; border-radius: 50%; cursor: pointer; border: none; padding: 0; transition: all 0.2s; }

    /* ── QUIZ ── */
    .quiz-q-wrap { margin-bottom: 20px; background: #0a1a18; border-radius: 12px; padding: 20px; border: 1px solid #1d4a44; }
    .quiz-q-text { color: #e0f7f4; font-size: 15px; margin-bottom: 14px; font-weight: 600; line-height: 1.4; }
    .quiz-q-num { color: #2dd4bf; font-family: 'JetBrains Mono', monospace; margin-right: 8px; }
    .quiz-opt { cursor: pointer; background: #0d2420; border: 1px solid #1a3a35; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; color: #7eb8b0; font-size: 14px; transition: all 0.15s; width: 100%; text-align: left; }
    .quiz-opt .ol { color: #2d6b63; margin-right: 8px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
    .quiz-opt.sel  { background: #0c2a24; border-color: #2dd4bf; color: #e0f7f4; }
    .quiz-opt.ok   { background: #052e16; border-color: #22c55e; color: #86efac; }
    .quiz-opt.bad  { background: #2d0a0a; border-color: #ef4444; color: #fca5a5; }
    .quiz-opt:disabled { cursor: default; }
    .score-box { background: linear-gradient(135deg, #052e16, #14532d); border: 1px solid #22c55e; border-radius: 12px; padding: 20px; margin-bottom: 24px; text-align: center; }
    .score-num { font-size: 32px; font-weight: bold; color: #4ade80; font-family: 'JetBrains Mono', monospace; }
    .score-msg { color: #86efac; margin-top: 4px; }
    .summary-text { color: #b2d8d4; line-height: 1.85; font-size: 15px; white-space: pre-wrap; }

    /* ── BANK ── */
    .bank-q { background: #0a1a18; border: 1px solid #1d4a44; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
    .bank-q-text { color: #e0f7f4; font-size: 14px; line-height: 1.4; margin-bottom: 8px; }
    .bank-q-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; border-radius: 5px; padding: 2px 7px; border: 1px solid; }
    .badge-ok  { background: #052e16; border-color: #22c55e; color: #86efac; }
    .badge-rev { background: #1a0f00; border-color: #f59e0b; color: #fcd34d; }
    .badge-new { background: #0c1a2e; border-color: #3b82f6; color: #93c5fd; }
    .bank-acc { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #5eead4; }

    /* ── OPEN QUESTIONS ── */
    .open-q-card { background: #0a1a18; border: 1px solid #1d4a44; border-radius: 12px; padding: 16px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; }
    .open-q-card:hover { border-color: #2dd4bf; transform: translateY(-1px); }
    .open-q-text { color: #e0f7f4; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .open-q-sub  { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #5eead4; }
    .rating-stars { display: flex; gap: 8px; margin-top: 8px; }
    .r-star { width: 36px; height: 36px; border-radius: 8px; border: 1px solid #1d4a44; background: #0a1a18; color: #5eead4; font-size: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; font-family: 'JetBrains Mono', monospace; font-weight: bold; }
    .r-star.sel { background: #0d9488; border-color: #2dd4bf; color: #fff; }
    .r-star:hover:not(.sel) { border-color: #2dd4bf; transform: translateY(-1px); }
    .sugg-box { background: #0c2a24; border: 1px solid #0d9488; border-radius: 10px; padding: 14px; margin-bottom: 14px; }
    .sugg-lbl { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #2dd4bf; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .sugg-text { color: #b2d8d4; font-size: 14px; line-height: 1.6; }

    /* ── TEST ── */
    .test-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .test-timer { font-family: 'JetBrains Mono', monospace; font-size: 20px; color: #2dd4bf; background: #0a1a18; border: 1px solid #1d4a44; border-radius: 10px; padding: 8px 16px; }
    .test-timer.warn { color: #f59e0b; border-color: #f59e0b; }
    .test-timer.danger { color: #ef4444; border-color: #ef4444; }
    .test-prog { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #5eead4; }
    .test-dots { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 16px; }
    .tdot { width: 28px; height: 28px; border-radius: 6px; border: 1px solid #1d4a44; background: #0a1a18; color: #5eead4; font-size: 10px; font-family: 'JetBrains Mono', monospace; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
    .tdot.answered { background: #0d9488; border-color: #2dd4bf; color: #fff; }
    .tdot.curr     { background: #14b8a6; border-color: #5eead4; color: #fff; font-weight: bold; }
    .tdot.open-q   { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
    .tdot.open-q.answered { background: #1d4ed8; border-color: #60a5fa; color: #fff; }
    .tdot.open-q.curr     { background: #2563eb; border-color: #93c5fd; color: #fff; font-weight: bold; }
    .open-ans-area { width: 100%; min-height: 120px; background: #0a1a18; border: 1px solid #1d4a44; border-radius: 10px; padding: 12px; color: #e0f7f4; font-size: 14px; resize: vertical; margin-bottom: 12px; font-family: 'Space Grotesk', sans-serif; }

    /* ── RESULTS ── */
    .final-box { background: linear-gradient(135deg, #052e16, #0c2a24); border: 2px solid #2dd4bf; border-radius: 16px; padding: 24px; text-align: center; margin-bottom: 24px; }
    .final-num { font-size: 52px; font-weight: 700; color: #2dd4bf; font-family: 'JetBrains Mono', monospace; }
    .final-sub { color: #5eead4; font-size: 14px; margin-top: 4px; }
    .err-item { background: #1a0505; border: 1px solid #7f1d1d; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
    .err-q   { color: #fca5a5; font-size: 13px; margin-bottom: 6px; }
    .err-ok  { color: #86efac; font-size: 12px; font-family: 'JetBrains Mono', monospace; }

    /* ── PROGRESS ── */
    .prog-stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .prog-stat { background: #0a1a18; border: 1px solid #1d4a44; border-radius: 10px; padding: 12px 18px; text-align: center; flex: 1; min-width: 90px; }
    .prog-val { font-size: 22px; font-weight: bold; font-family: 'JetBrains Mono', monospace; color: #2dd4bf; }
    .prog-lbl { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: #2d6b63; text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }

    /* ── FILTER BAR ── */
    .filter-bar { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .f-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #1d4a44; background: transparent; color: #5eead4; font-family: 'JetBrains Mono', monospace; font-size: 11px; transition: all 0.15s; }
    .f-btn:hover:not(.active) { border-color: #2dd4bf; transform: none; filter: none; }
    .f-btn.active { background: #0d9488; border-color: #14b8a6; color: #fff; }

    /* ── MISC ── */
    .sec-lbl { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #2d6b63; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .sec-lbl::after { content: ''; flex: 1; height: 1px; background: #1a3a35; }
    .empty { text-align: center; padding: 48px 24px; color: #2d6b63; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .chart-wrap { overflow-x: auto; }

    /* ── MODAL ── */
    .modal-ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
    .modal-ov.on { display: flex; }
    .modal-box { background: #0d2420; border: 1px solid #1a3a35; border-radius: 20px; padding: 28px; max-width: 460px; width: 100%; }
    .modal-box h2 { font-size: 20px; color: #e0f7f4; margin-bottom: 16px; }


    /* ── SETUP OVERLAY ── */
    .setup-ov { position: fixed; inset: 0; background: #0a1a18; z-index: 300; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .setup-box { background: #0d2420; border: 1px solid #1a3a35; border-radius: 20px; padding: 36px 32px; max-width: 460px; width: 100%; }
    .setup-title { font-size: 28px; font-weight: 700; background: linear-gradient(90deg,#2dd4bf,#5eead4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom: 8px; }
    .setup-sub { color: #2d6b63; font-size: 13px; margin-bottom: 24px; line-height: 1.6; }
    .setup-hint { font-size: 11px; color: #2d6b63; font-family: 'JetBrains Mono', monospace; margin: 8px 0 20px; }
    .setup-hint a { color: #2dd4bf; text-decoration: none; }
    /* ── PDF UPLOAD ── */
    .upload-row { display: flex; gap: 8px; align-items: stretch; margin-bottom: 10px; }
    .pdf-btn { flex: 0 0 auto; background: #0a1a18; border: 1.5px dashed #1d4a44; border-radius: 10px; padding: 0 16px; color: #2d6b63; font-family: 'JetBrains Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; min-width: 64px; }
    .pdf-btn:hover { border-color: #2dd4bf; color: #2dd4bf; }
    .pdf-btn.loaded { border-color: #22c55e; border-style: solid; color: #4ade80; }
    .pdf-btn span { font-size: 18px; }
    #pdfInput { display: none; }
    /* ── SETTINGS BTN ── */
    .settings-btn { background: transparent; border: 1px solid #1d4a44; border-radius: 8px; padding: 6px 12px; color: #2d6b63; font-family: 'JetBrains Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.2s; }
    .settings-btn:hover { border-color: #2dd4bf; color: #2dd4bf; }

    @media (max-width: 600px) {
      .tab-btn { font-size: 10px; padding: 8px 9px; }
      .fc-text { font-size: 16px; }
      .projects-grid { grid-template-columns: 1fr; }
      .final-num { font-size: 40px; }
    }
  </style>
</head>
<body>

<!-- ═══ SETUP OVERLAY (first visit / no key) ═══ -->
<div id="setupOv" class="setup-ov" style="display:none;">
  <div class="setup-box">
    <div class="setup-title">StudyAI ✦</div>
    <p class="setup-sub">Inserisci la tua API key di Anthropic per iniziare.<br>Verrà salvata nel browser — non ti verrà più chiesta.</p>
    <label class="lbl">API Key</label>
    <input type="password" id="setupKeyInput" class="input-field" placeholder="sk-ant-..." autocomplete="off" style="margin-bottom:8px;">
    <div class="setup-hint">Ottieni la chiave su <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> → API Keys</div>
    <button class="btn btn-teal btn-full" onclick="confirmSetupKey()">Conferma e inizia →</button>
  </div>
</div>

<!-- ═══ PROJECTS SCREEN ═══ -->
<div id="sc-projects" class="screen active">
  <div class="container">
    <div class="app-header">
      <div class="app-title">StudyAI ✦</div>
      <div class="app-sub">Trasforma qualsiasi testo in strumenti di studio</div>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
      <button class="settings-btn" onclick="openSettings()">⚙ Impostazioni</button>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
      <span style="font-size:18px;font-weight:700;color:#e0f7f4;">I tuoi progetti</span>
    </div>
    <div id="projectsGrid" class="projects-grid"></div>
  </div>
</div>

<!-- ═══ PROJECT SCREEN ═══ -->
<div id="sc-project" class="screen">
  <div class="container">
    <div class="proj-topbar">
      <button class="btn btn-ghost" onclick="goToProjects()">← Progetti</button>
      <span id="projTitle" class="proj-title"></span>
      <button class="btn btn-danger" onclick="deleteProject()">Elimina</button>
    </div>
    <div class="tab-bar-wrap">
      <div class="tab-bar" id="projTabBar"></div>
    </div>
    <div id="projPanel" class="content-panel"></div>
    <div id="projStats" class="stats-bar" style="display:none;"></div>
  </div>
</div>

<!-- ═══ MODAL ═══ -->
<div id="modal" class="modal-ov">
  <div class="modal-box">
    <h2 id="modalTitle"></h2>
    <div id="modalBody"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// SYSTEM PROMPT
// ═══════════════════════════════════════════════
const SYS = `You are an educational AI. Given input text, generate a structured study set in JSON format.
Return ONLY valid JSON, no markdown, no backticks, no explanation.

{
  "map": {
    "nodes": [
      {"id":"0","label":"Main Topic","parentId":null},
      {"id":"1","label":"Subtopic 1","parentId":"0"}
    ]
  },
  "flashcards": [
    {"front":"Question or term","back":"Answer or definition"}
  ],
  "quiz": [
    {"question":"...","options":["A","B","C","D"],"correct":0}
  ],
  "openQuestions": [
    {"question":"Explain...","suggestedAnswer":"The ideal answer includes..."}
  ],
  "summary": "3-5 paragraph summary."
}

Rules:
- map: 8-14 nodes, one root (parentId: null), labels max 4 words
- flashcards: 8-12 cards
- quiz: EXACTLY 30 multiple choice questions, varied difficulty, "correct" is index 0-3
- openQuestions: EXACTLY 5 open-ended questions with detailed suggested answers
- summary: 3-5 paragraphs
- Respond in the SAME LANGUAGE as the input text`;

// API CALL
// ═══════════════════════════════════════════════
async function doGenerate() {
  const apiKey = (localStorage.getItem('studyai_key') || '').trim();
  const text   = document.getElementById('inputText')?.value?.trim();
  if (!text) return;

  const btn = document.getElementById('genBtn');
  const err = document.getElementById('errBox');
  if (btn) { btn.disabled=true; btn.classList.add('loading'); btn.textContent='⏳ Generazione in corso...'; }
  if (err)   err.style.display = 'none';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'x-api-key': apiKey,
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 8000,
        system: SYS,
        messages: [{ role:'user', content: text }],
      }),
    });
    if (!res.ok) {
      const e = await res.json().catch(()=>({}));
      throw new Error(e.error?.message || 'HTTP '+res.status);
    }
    const data = await res.json();
    const raw  = data.content[0].text.replace(/```json|```/g,'').trim();
    ps.studySet = JSON.parse(raw);
    ps.qAns = {}; ps.qDone = false;

    const src = text.slice(0,50)+'…';
    mergeBankQuestions(ps.studySet.quiz || [], src);
    mergeOpenQuestions(ps.studySet.openQuestions || [], src);
    save();
    renderProjContent();
    showStats();
  } catch(e) {
    if (err) { err.style.display='block'; err.textContent='⚠ '+e.message; }
  }

  if (btn) { btn.disabled=false; btn.classList.remove('loading'); btn.textContent='✨ Genera set di studio'; }
  const ta = document.getElementById('inputText');
  if (btn && ta) btn.disabled = !ta.value.trim();
}

function mergeBankQuestions(qs, src) {
  const p = proj();
  if (!p.bank) p.bank = [];
  const exist = new Set(p.bank.map(q => q.question.trim().toLowerCase()));
  let added = 0;
  for (const q of qs) {
    if (exist.has(q.question.trim().toLowerCase())) continue;
    p.bank.push({ id:uid(), question:q.question, options:q.options, correct:q.correct, src, createdAt:new Date().toISOString(), timesAns:0, timesOk:0 });
    exist.add(q.question.trim().toLowerCase());
    if (++added >= 30) break;
  }
}

function mergeOpenQuestions(qs, src) {
  const p = proj();
  if (!p.openQs) p.openQs = [];
  const exist = new Set(p.openQs.map(q => q.question.trim().toLowerCase()));
  for (const q of qs) {
    if (exist.has(q.question.trim().toLowerCase())) continue;
    p.openQs.push({ id:uid(), question:q.question, suggestedAnswer:q.suggestedAnswer, src, createdAt:new Date().toISOString(), attempts:[] });
    exist.add(q.question.trim().toLowerCase());
  }
}

function showStats() {
  if (!ps.studySet) return;
  const bar = document.getElementById('projStats');
  bar.style.display = 'flex';
  bar.innerHTML = [
    { v:(ps.studySet.map?.nodes||[]).length, l:'nodi mappa' },

// ═══════════════════════════════════════════════
function tabMap() {
  if (!ps.studySet?.map?.nodes?.length) return empty('🗺','Genera prima un set di studio');
  return buildMap(ps.studySet.map.nodes);
}

function buildMap(nodes) {
  const nm = {};
  nodes.forEach(n => (nm[n.id]={...n, ch:[]}));
  nodes.forEach(n => { if (n.parentId!=null && nm[n.parentId]) nm[n.parentId].ch.push(n.id); });
  const W=720, H=480, cx=W/2, cy=H/2, R=[0,150,275,370];
  const lvl={}, vis=new Set();
  const q = nodes.filter(n=>n.parentId==null).map(n=>({id:n.id,l:0}));
  while(q.length){
    const {id,l}=q.shift(); if(vis.has(id)) continue; vis.add(id);
    if(!lvl[l]) lvl[l]=[];
    lvl[l].push(id);
    (nm[id]?.ch||[]).forEach(c=>q.push({id:c,l:l+1}));
  }
  const pos={};
  Object.entries(lvl).forEach(([lv,ids])=>{
    const r=R[Math.min(+lv,R.length-1)];
    ids.forEach((id,i)=>{
      const a=(2*Math.PI*i/ids.length)-Math.PI/2;
      pos[id]={x:+lv===0?cx:cx+r*Math.cos(a),y:+lv===0?cy:cy+r*Math.sin(a),lv:+lv};
    });
  });
  const CLR=['#0d9488','#0891b2','#7c3aed','#b45309'];
  const edges=nodes.filter(n=>n.parentId!=null&&pos[n.id]&&pos[n.parentId])
    .map(n=>`<line x1="${pos[n.parentId].x}" y1="${pos[n.parentId].y}" x2="${pos[n.id].x}" y2="${pos[n.id].y}" stroke="#1d4a44" stroke-width="1.5"/>`).join('');
  const ns=nodes.map(n=>{
    const p=pos[n.id]; if(!p) return '';
    const c=CLR[Math.min(p.lv,CLR.length-1)], root=p.lv===0;
    const w=root?130:110, hh=root?40:32;
    const lbl=n.label.length>18?n.label.slice(0,16)+'…':n.label;
    return `<g transform="translate(${p.x},${p.y})">
      <rect x="${-w/2}" y="${-hh/2}" width="${w}" height="${hh}" rx="${root?10:8}" fill="${c}" opacity="0.9" stroke="${root?'#2dd4bf':c}" stroke-width="${root?2:1}"/>
      ${root?`<rect x="${-w/2}" y="${-hh/2}" width="${w}" height="${hh}" rx="10" fill="none" stroke="#5eead4" stroke-width="1.5" opacity="0.3" transform="scale(1.07)"/>`:''}
      <text text-anchor="middle" dy="0.4em" fill="white" font-size="${root?12:10}" font-family="JetBrains Mono,monospace" font-weight="${root?'bold':'normal'}">${x(lbl)}</text>
    </g>`;
  }).join('');
  return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" style="width:100%;max-height:460px">
    <defs><radialGradient id="mg"><stop offset="0%" stop-color="#0d2420"/><stop offset="100%" stop-color="#0a1a18"/></radialGradient></defs>
    <rect width="${W}" height="${H}" fill="url(#mg)" rx="12"/>
    ${edges}${ns}
  </svg></div>`;
}

// ═══════════════════════════════════════════════
// TAB: FLASHCARD
// ═══════════════════════════════════════════════
function tabFlashcards() {
  const cards = ps.studySet?.flashcards;
  if (!cards?.length) return empty('🃏','Genera prima un set di studio');
  const c=cards[ps.fcIdx], back=ps.fcFlip;
  const dots=cards.map((_,i)=>`<button class="dot" style="background:${i===ps.fcIdx?'#2dd4bf':'#1d4a44'}" onclick="fcGo(${i})"></button>`).join('');
  return `
    <div class="fc-counter">${ps.fcIdx+1} / ${cards.length}</div>
    <div class="flashcard ${back?'back':'front'}" onclick="fcFlip()">
      <div>
        <div class="fc-hint">${back?'↩ risposta':'↺ clicca per girare'}</div>
        <div class="fc-text">${h(back?c.back:c.front)}</div>
      </div>
    </div>
    <div class="fc-nav">
      <button class="btn btn-ghost" onclick="fcPrev()" ${ps.fcIdx===0?'disabled':''}>← Prec</button>

    </div>
    <div class="dots">${dots}</div>`;
}
function fcFlip()     { ps.fcFlip=!ps.fcFlip; renderProjContent(); }
function fcPrev()     { if(ps.fcIdx>0){ps.fcIdx--;ps.fcFlip=false;renderProjContent();} }
function fcNext(n)    { if(ps.fcIdx<n-1){ps.fcIdx++;ps.fcFlip=false;renderProjContent();} }
function fcGo(i)      { ps.fcIdx=i;ps.fcFlip=false;renderProjContent(); }

// ═══════════════════════════════════════════════
// TAB: QUIZ RAPIDO
// ═══════════════════════════════════════════════
function tabQuiz() {
  const qs=ps.studySet?.quiz;
  if(!qs?.length) return empty('❓','Genera prima un set di studio');
  const sc=ps.qDone?qs.filter((q,i)=>ps.qAns[i]===q.correct).length:0;
  const scoreH=ps.qDone?`<div class="score-box"><div class="score-num">${sc}/${qs.length}</div>
    <div class="score-msg">${sc===qs.length?'Perfetto! 🎉':sc>=qs.length*0.7?'Ottimo! 👍':"Ripassare ancora 📚"}</div></div>`:''  ;
  const qH=qs.map((q,qi)=>{
    const opts=q.options.map((o,oi)=>{
      let c='quiz-opt';
      if(ps.qDone){if(oi===q.correct)c+=' ok';else if(ps.qAns[qi]===oi)c+=' bad';}
      else if(ps.qAns[qi]===oi)c+=' sel';
      return `<button class="${c}" onclick="qAns(${qi},${oi})" ${ps.qDone?'disabled':''}><span class="ol">${['A','B','C','D'][oi]}.</span>${h(o)}</button>`;
    }).join('');
    return `<div class="quiz-q-wrap"><div class="quiz-q-text"><span class="quiz-q-num">${qi+1}.</span>${h(q.question)}</div>${opts}</div>`;
  }).join('');
  const ans=Object.keys(ps.qAns).length;
  const btn=!ps.qDone
    ?`<button class="btn btn-teal btn-full" onclick="qSubmit()" ${ans<qs.length?'disabled':''}>Controlla risposte (${ans}/${qs.length})</button>`
    :`<button class="btn btn-ghost btn-full" onclick="qRetry()">🔄 Riprova</button>`;
  return scoreH+qH+btn;
}
function qAns(qi,oi)  { if(!ps.qDone){ps.qAns[qi]=oi;renderProjContent();} }
function qSubmit()    { ps.qDone=true;renderProjContent(); }
function qRetry()     { ps.qAns={};ps.qDone=false;renderProjContent(); }

// ═══════════════════════════════════════════════
// TAB: RIASSUNTO
// ═══════════════════════════════════════════════
function tabSummary() {
  if(!ps.studySet?.summary) return empty('📝','Genera prima un set di studio');

}

// ═══════════════════════════════════════════════
// TAB: BANCA DOMANDE
// ═══════════════════════════════════════════════
function tabBank() {
  const p=proj(), bank=p.bank||[];
  if(!bank.length) return empty('🗃','Genera un set di studio per popolare la banca domande');
  const fil=bank.filter(q=>{
    if(ps.bankF==='ok')  return isMastered(q);
    if(ps.bankF==='rev') return !isMastered(q)&&q.timesAns>0;
    return true;
  });
  const okN  =bank.filter(isMastered).length;
  const revN =bank.filter(q=>!isMastered(q)&&q.timesAns>0).length;
  const fb=`<div class="filter-bar">
    <button class="f-btn ${ps.bankF==='all'?'active':''}" onclick="setBankF('all')">Tutte (${bank.length})</button>
    <button class="f-btn ${ps.bankF==='rev'?'active':''}" onclick="setBankF('rev')">Da rivedere (${revN})</button>
    <button class="f-btn ${ps.bankF==='ok'?'active':''}"  onclick="setBankF('ok')">Padroneggiate (${okN})</button>
  </div>`;
  if(!fil.length) return fb+`<div class="empty"><div class="empty-icon">🔍</div>Nessuna domanda in questa categoria</div>`;
  const list=fil.map(q=>{
    const pct=q.timesAns>0?Math.round(q.timesOk/q.timesAns*100):null;
    const bd=isMastered(q)?`<span class="badge badge-ok">✅ Padroneggiata</span>`
      :q.timesAns===0?`<span class="badge badge-new">Nuova</span>`
      :`<span class="badge badge-rev">⚠ Da rivedere</span>`;
    const acc=pct!==null?`<span class="bank-acc">${pct}% · ${q.timesAns} risp.</span>`:'';
    return `<div class="bank-q"><div class="bank-q-text">${h(q.question)}</div><div class="bank-q-meta">${bd}${acc}</div></div>`;
  }).join('');
  return fb+list;
}
function isMastered(q){ return q.timesAns>=3&&(q.timesOk/q.timesAns)>=0.8; }
function setBankF(f)  { ps.bankF=f; renderProjContent(); }

// ═══════════════════════════════════════════════
// TAB: DOMANDE APERTE
// ═══════════════════════════════════════════════
function tabOpen() {
  const p=proj(), qs=p.openQs||[];
  if(!qs.length) return empty('✍️','Genera un set di studio per avere domande aperte');
  if(ps.openSel!==null) return openDetail(qs[ps.openSel], ps.openSel);
  return qs.map((q,i)=>{
    const done=q.attempts?.some(a=>a.rating>=5);
    const last=q.attempts?.length?q.attempts[q.attempts.length-1].rating:null;
    return `<div class="open-q-card" onclick="selOpen(${i})">
      <div style="display:flex;gap:8px;align-items:flex-start;">
        <div style="flex:1;">
          <div class="open-q-text">${h(q.question)}</div>
          <div class="open-q-sub">${q.attempts?.length||0} tentativo/i${last?` · ultimo voto: ${last}/5`:''}</div>
        </div>
        ${done?`<span class="badge badge-ok">✅ Completata</span>`:''}
      </div>
    </div>`;
  }).join('');
}

function openDetail(q, idx) {
  const attempts=q.attempts||[];
  const stars=[1,2,3,4,5].map(n=>`<button class="r-star ${ps.openRating===n?'sel':''}" onclick="setOR(${n})">${n}</button>`).join('');
  const chart=attempts.length>=2?ratingChart(attempts):'';
  const hist=attempts.length?`<div class="sec-lbl" style="margin-top:20px;">Storico</div>
    ${attempts.slice().reverse().map(a=>`
      <div style="display:flex;gap:12px;align-items:center;padding:8px 12px;background:#0a1a18;border:1px solid #1d4a44;border-radius:8px;margin-bottom:6px;font-family:'JetBrains Mono',monospace;font-size:12px;">
        <span style="color:#5eead4;">${a.date.slice(0,10)}</span>
        <span style="color:#2dd4bf;">Voto: ${a.rating}/5</span>
        ${a.notes?`<span style="color:#7eb8b0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${h(a.notes)}</span>`:''}
      </div>`).join('')}`:'';
  return `
    <button class="btn btn-ghost" onclick="ps.openSel=null;ps.openRating=0;renderProjContent();" style="margin-bottom:16px;">← Lista</button>
    <div style="font-size:16px;font-weight:700;color:#e0f7f4;margin-bottom:14px;line-height:1.4;">${h(q.question)}</div>
    <div class="sugg-box"><div class="sugg-lbl">Risposta suggerita</div><div class="sugg-text">${h(q.suggestedAnswer)}</div></div>
    <div class="sec-lbl">Valuta la tua risposta</div>
    <textarea id="openNotes" class="input-field" rows="3" placeholder="Note opzionali..."></textarea>
    <div style="display:flex;align-items:center;gap:12px;margin-top:10px;flex-wrap:wrap;">
      <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#5eead4;">Voto:</span>
      <div class="rating-stars">${stars}</div>
      <button class="btn btn-teal" onclick="saveOR(${idx})" ${!ps.openRating?'disabled':''}>Salva</button>
    </div>
    ${chart}${hist}`;
}

function selOpen(i)  { ps.openSel=i; ps.openRating=0; renderProjContent(); }
function setOR(n)    { ps.openRating=n; renderProjContent(); }
function saveOR(idx) {
  const p=proj(), q=p.openQs[idx];
  if(!q.attempts) q.attempts=[];
  q.attempts.push({date:new Date().toISOString(), rating:ps.openRating, notes:document.getElementById('openNotes')?.value.trim()||''});
  save(); ps.openRating=0; renderProjContent();
}

function ratingChart(att) {
  const W=400, H=90, px=24, py=16;
  const pts=att.map((a,i)=>({x:px+(i/(att.length-1))*(W-px*2),y:H-py-((a.rating-1)/4)*(H-py*2),r:a.rating}));
  const line=pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
  return `<div class="sec-lbl" style="margin-top:20px;">Andamento</div>
  <div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" style="width:100%;max-height:110px;">
    <path d="${line}" fill="none" stroke="#2dd4bf" stroke-width="2"/>
    ${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="#2dd4bf"/>`).join('')}
    ${pts.map(p=>`<text x="${p.x}" y="${p.y-8}" text-anchor="middle" fill="#5eead4" font-size="9" font-family="JetBrains Mono,monospace">${p.r}</text>`).join('')}
  </svg></div>`;
}

// ═══════════════════════════════════════════════
// TAB: TEST COMPLETO
// ═══════════════════════════════════════════════
function tabTest() {
  if(ps.testDone && ps.testResults) return testResults();
  if(ps.testActive) return testInProgress();
  return testStart();
}

function testStart() {
  const p=proj();
  const bN=(p.bank||[]).length, oN=(p.openQs||[]).length;
  const ok=bN>=1;
  return `<div style="text-align:center;padding:32px 0;">
    <div style="font-size:40px;margin-bottom:16px;">📋</div>
    <div style="font-size:20px;font-weight:700;color:#e0f7f4;margin-bottom:8px;">Test Completo</div>
    <div style="color:#5eead4;font-family:'JetBrains Mono',monospace;font-size:13px;margin-bottom:24px;line-height:1.8;">
      ${Math.min(bN,30)} crocette dalla banca<br>
      + ${Math.min(oN,2)} domande aperte<br>
      ⏱ 30 minuti
    </div>
    ${!ok?`<div class="error-box" style="margin-bottom:16px;">Aggiungi almeno 1 domanda alla banca prima di iniziare</div>`:''}
    <button class="btn btn-teal" style="padding:14px 32px;font-size:16px;" onclick="startTest()" ${!ok?'disabled':''}>▶ Inizia test</button>
  </div>`;
}

function startTest() {
  const p=proj();
  const bank  = shuffle([...(p.bank||[])]).slice(0,30).map(q=>({...q,type:'mcq'}));
  const opens = shuffle([...(p.openQs||[])]).slice(0,2).map(q=>({...q,type:'open'}));
  ps.testQs   = [...bank, ...opens];
  ps.testIdx  = 0;
  ps.tAns={};ps.tOpenTxt={};ps.tOpenRating={};ps.tShowSugg={};
  ps.testActive=true;ps.testDone=false;ps.testResults=null;
  ps.timerSec=1800;
  killTimer();
  ps.timerRef=setInterval(()=>{
    ps.timerSec--;
    const el=document.getElementById('testTimer');
    if(el) {
      const m=Math.floor(ps.timerSec/60), s=ps.timerSec%60;
      el.textContent=`${pad(m)}:${pad(s)}`;
      el.className='test-timer'+(ps.timerSec<=300?' warn':'')+(ps.timerSec<=60?' danger':'');
    }
    if(ps.timerSec<=0){killTimer();finishTest();}
  },1000);
  renderProjContent();
}

function killTimer() { if(ps.timerRef){clearInterval(ps.timerRef);ps.timerRef=null;} }
function pad(n)      { return String(n).padStart(2,'0'); }

function testInProgress() {
  const qs=ps.testQs, q=qs[ps.testIdx], tot=qs.length;
  const m=Math.floor(ps.timerSec/60),s=ps.timerSec%60;
  const tc='test-timer'+(ps.timerSec<=300?' warn':'')+(ps.timerSec<=60?' danger':'');

  const dotH=qs.map((qd,i)=>{
    const isOpen=qd.type==='open';
    const answered=isOpen?(ps.tOpenTxt[i]||'').trim().length>0:ps.tAns[i]!==undefined;
    let c='tdot'+(isOpen?' open-q':'')+(answered?' answered':'')+(i===ps.testIdx?' curr':'');
    return `<button class="${c}" onclick="tGo(${i})">${i+1}</button>`;
  }).join('');

  let qH='';
  if(q.type==='mcq'){
    const opts=q.options.map((o,oi)=>{
      const sel=ps.tAns[ps.testIdx]===oi;
      return `<button class="quiz-opt ${sel?'sel':''}" onclick="tMCQ(${oi})"><span class="ol">${['A','B','C','D'][oi]}.</span>${h(o)}</button>`;
    }).join('');
    qH=`<div class="quiz-q-wrap"><div class="quiz-q-text">${h(q.question)}</div>${opts}</div>`;
  } else {
    const showS=ps.tShowSugg[ps.testIdx];
    const ratings=[1,2,3,4,5].map(n=>`<button class="r-star ${ps.tOpenRating[ps.testIdx]===n?'sel':''}" onclick="tOR(${n})">${n}</button>`).join('');
    qH=`<div class="quiz-q-wrap">
      <div class="quiz-q-text" style="color:#93c5fd;">✍️ Domanda aperta</div>
      <div class="quiz-q-text">${h(q.question)}</div>
      <textarea class="open-ans-area" id="oAns" placeholder="Scrivi la tua risposta..."
        oninput="ps.tOpenTxt[${ps.testIdx}]=this.value">${h(ps.tOpenTxt[ps.testIdx]||'')}</textarea>
      ${showS?`
        <div class="sugg-box"><div class="sugg-lbl">Risposta suggerita</div><div class="sugg-text">${h(q.suggestedAnswer)}</div></div>
        <div style="margin-top:10px;">
          <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#5eead4;margin-bottom:8px;">Autovalutazione:</div>
          <div class="rating-stars">${ratings}</div>
        </div>`
      :`<button class="btn btn-ghost" onclick="tShowS(${ps.testIdx})" style="margin-top:8px;">👁 Mostra risposta suggerita</button>`}
    </div>`;
  }

  const mcqTot=qs.filter(q=>q.type==='mcq').length;
  const ansMCQ=Object.keys(ps.tAns).length;
  const openTot=qs.filter(q=>q.type==='open').length;
  const ansOpen=Object.values(ps.tOpenTxt).filter(t=>t.trim()).length;
  const canEnd=ansMCQ>=mcqTot&&ansOpen>=openTot;

  return `
    <div class="test-header">
      <div id="testTimer" class="${tc}">${pad(m)}:${pad(s)}</div>
      <div class="test-prog">${ps.testIdx+1} / ${tot}</div>
      <button class="btn btn-teal" onclick="finishTest()" ${!canEnd?'disabled':''}>Termina</button>
    </div>
    <div class="test-dots">${dotH}</div>
    ${qH}
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn btn-ghost" onclick="tGo(${Math.max(0,ps.testIdx-1)})" ${ps.testIdx===0?'disabled':''}>← Prec</button>
      <button class="btn btn-ghost" onclick="tGo(${Math.min(tot-1,ps.testIdx+1)})" ${ps.testIdx===tot-1?'disabled':''} style="margin-left:auto;">Succ →</button>
    </div>`;
}

function tGo(i)    { ps.testIdx=i; renderProjContent(); }
function tMCQ(oi)  { ps.tAns[ps.testIdx]=oi; renderProjContent(); }
function tShowS(i) { ps.tShowSugg[i]=true; renderProjContent(); }
function tOR(n)    { ps.tOpenRating[ps.testIdx]=n; renderProjContent(); }

function finishTest() {
  killTimer();
  const p=proj(), qs=ps.testQs;
  const mcqQs=qs.map((q,i)=>q.type==='mcq'?{q,i}:null).filter(Boolean);
  const openQs=qs.map((q,i)=>q.type==='open'?{q,i}:null).filter(Boolean);

  let correct=0; const errors=[];
  mcqQs.forEach(({q,i})=>{
    const bq=p.bank?.find(b=>b.id===q.id);
    if(ps.tAns[i]===q.correct){
      correct++;
      if(bq){bq.timesAns++;bq.timesOk++;}
    } else {
      if(bq) bq.timesAns++;
      errors.push({question:q.question, correct:q.options[q.correct], yours:ps.tAns[i]!=null?q.options[ps.tAns[i]]:null});
    }
  });

  const openRatings=openQs.map(({i})=>ps.tOpenRating[i]||0);
  const avgOpen=openRatings.length?openRatings.reduce((a,b)=>a+b,0)/openRatings.length:0;
  const pct=mcqQs.length?Math.round(correct/mcqQs.length*100):0;
  const mcqScore=mcqQs.length?(correct/mcqQs.length)*27:0;
  const openScore=(avgOpen/5)*3;
  const finalScore=Math.min(30, Math.round(mcqScore+openScore));

  if(!p.history) p.history=[];
  p.history.push({date:new Date().toISOString(), score:correct, total:mcqQs.length, percentage:pct, type:'full', finalScore});
  save();

  ps.testResults={correct, totalMCQ:mcqQs.length, errors, avgOpen:Math.round(avgOpen*10)/10, finalScore, pct};
  ps.testDone=true; ps.testActive=false;
  renderProjContent();
}

function testResults() {
  const r=ps.testResults;
  const errH=r.errors.map(e=>`<div class="err-item">
    <div class="err-q">${h(e.question)}</div>
    <div class="err-ok">✅ Corretta: ${h(e.correct)}</div>
    ${e.yours?`<div style="color:#fca5a5;font-size:12px;font-family:'JetBrains Mono',monospace;">✗ Tua: ${h(e.yours)}</div>`:''}
  </div>`).join('');
  return `
    <div class="final-box">
      <div class="final-num">${r.finalScore}<span style="font-size:26px;">/30</span></div>
      <div class="final-sub">${r.correct}/${r.totalMCQ} crocette · Media aperte: ${r.avgOpen}/5</div>
    </div>
    <div style="margin-bottom:20px;">
      <div class="sec-lbl">Riepilogo</div>
      <div class="stats-bar" style="justify-content:flex-start;margin-top:0;">
        <div class="stat-item"><div class="stat-val">${r.pct}%</div><div class="stat-lbl">Esattezza</div></div>
        <div class="stat-item"><div class="stat-val">${r.correct}</div><div class="stat-lbl">Corrette</div></div>
        <div class="stat-item"><div class="stat-val" style="color:#fca5a5;">${r.totalMCQ-r.correct}</div><div class="stat-lbl">Errori</div></div>
      </div>
    </div>
    ${r.errors.length?`<div class="sec-lbl">Errori (${r.errors.length})</div>${errH}`:''}
    <button class="btn btn-teal btn-full" style="margin-top:16px;" onclick="ps.testDone=false;ps.testResults=null;ps.testActive=false;renderProjContent();">🔄 Nuovo test</button>`;
}

// ═══════════════════════════════════════════════
// TAB: PROGRESSI
// ═══════════════════════════════════════════════
function tabProgress() {
  const p=proj(), hist=p.history||[];
  if(!hist.length) return empty('📈','Completa almeno un test per vedere i progressi');
  const pcts=hist.map(h=>h.percentage);
  const avg=Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length);
  const best=Math.max(...pcts);
  const trend=pcts.length>=2?(pcts[pcts.length-1]>pcts[pcts.length-2]?'↑':pcts[pcts.length-1]<pcts[pcts.length-2]?'↓':'→'):'→';
  const tc=trend==='↑'?'#2dd4bf':trend==='↓'?'#f97316':'#5eead4';
  const lc=trend==='↓'?'#f97316':'#2dd4bf';
  const stats=`<div class="prog-stats">
    <div class="prog-stat"><div class="prog-val">${avg}%</div><div class="prog-lbl">Media</div></div>
    <div class="prog-stat"><div class="prog-val">${best}%</div><div class="prog-lbl">Miglior risultato</div></div>
    <div class="prog-stat"><div class="prog-val">${hist.length}</div><div class="prog-lbl">Test completati</div></div>
    <div class="prog-stat"><div class="prog-val" style="color:${tc}">${trend}</div><div class="prog-lbl">Trend</div></div>
  </div>`;
  const chart=hist.length>=2?lineChart(hist,lc):'';
  const table=`<div class="sec-lbl" style="margin-top:20px;">Storico</div>`+
    hist.slice().reverse().map(e=>`
      <div style="display:flex;gap:12px;align-items:center;padding:8px 14px;background:#0a1a18;border:1px solid #1d4a44;border-radius:8px;margin-bottom:6px;font-family:'JetBrains Mono',monospace;font-size:12px;">
        <span style="color:#5eead4;flex:1;">${e.date.slice(0,10)}</span>
        <span style="color:#2dd4bf;">${e.score}/${e.total}</span>
        <span style="font-weight:bold;">${e.percentage}%</span>
        ${e.finalScore!=null?`<span style="color:#5eead4;">${e.finalScore}/30</span>`:''}
      </div>`).join('');
  return stats+chart+table;
}

function lineChart(hist,lc) {
  const W=560,H=130,px=32,py=18;
  const pts=hist.map((e,i)=>({x:px+(i/(hist.length-1))*(W-px*2),y:H-py-(e.percentage/100)*(H-py*2)}));
  const line=pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
  const area=`M${pts[0].x},${H-py} `+pts.map(p=>`L${p.x},${p.y}`).join(' ')+` L${pts[pts.length-1].x},${H-py} Z`;
  const grid=[0,25,50,75,100].map(v=>{
    const y=H-py-(v/100)*(H-py*2);
    return `<line x1="${px}" y1="${y}" x2="${W-px}" y2="${y}" stroke="#1d4a44" stroke-width="0.5"/>
            <text x="${px-4}" y="${y+3}" text-anchor="end" fill="#2d6b63" font-size="8" font-family="JetBrains Mono,monospace">${v}</text>`;
  }).join('');
  return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" style="width:100%;max-height:150px;">
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${lc}" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="${lc}" stop-opacity="0"/>
    </linearGradient></defs>
    ${grid}
    <path d="${area}" fill="url(#ag)"/>
    <path d="${line}" fill="none" stroke="${lc}" stroke-width="2"/>
    ${pts.map((p,i)=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="${lc}"/>`).join('')}
    ${pts.map((p,i)=>`<text x="${p.x}" y="${p.y-9}" text-anchor="middle" fill="${lc}" font-size="9" font-family="JetBrains Mono,monospace">${hist[i].percentage}%</text>`).join('')}
  </svg></div>`;
}

function modal(title, body) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML    = body;
  document.getElementById('modal').classList.add('on');
}
function closeModal() { document.getElementById('modal').classList.remove('on'); }
document.getElementById('modal').addEventListener('click', e=>{ if(e.target.id==='modal') closeModal(); });

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function h(s)   { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function x(s)   { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function empty(ic,msg){ return `<div class="empty"><div class="empty-icon">${ic}</div>${msg}</div>`; }
function uid()  { return crypto.randomUUID(); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// ═══ KEY SETUP ═══
function confirmSetupKey() {
  const key = document.getElementById('setupKeyInput').value.trim();
  if (!key.startsWith('sk-')) {
    document.getElementById('setupKeyInput').style.borderColor = '#ef4444';
    return;
  }
  localStorage.setItem('studyai_key', key);
  document.getElementById('setupOv').style.display = 'none';
}

function openSettings() {
  const key = localStorage.getItem('studyai_key') || '';
  modal('⚙ Impostazioni', `
    <label class="lbl">API Key Anthropic</label>
    <input type="password" id="settingsKey" class="input-field" value="${h(key)}" placeholder="sk-ant-..." style="margin-bottom:8px;">
    <div class="setup-hint">Ottieni la chiave su <a href="https://console.anthropic.com" target="_blank" style="color:#2dd4bf;">console.anthropic.com</a></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
      <button class="btn btn-ghost" onclick="closeModal()">Annulla</button>
      <button class="btn btn-teal" onclick="saveSettings()">Salva</button>
    </div>`);
  setTimeout(()=>document.getElementById('settingsKey')?.focus(), 80);
}

function saveSettings() {
  const key = document.getElementById('settingsKey')?.value.trim();
  if (key) localStorage.setItem('studyai_key', key);
  closeModal();
}

// ═══ PDF LOADER ═══
async function loadPDF(input) {
  const file = input.files[0];
  if (!file) return;
  const btn = document.getElementById('pdfBtn');
  if (btn) { btn.innerHTML = '<span>⏳</span>'; btn.classList.remove('loaded'); }
  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const ab  = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
    let text = '';
    for (let i = 1; i <= Math.min(pdf.numPages, 40); i++) {
      const page    = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join(' ') + '\n';
    }
    const ta = document.getElementById('inputText');
    if (ta) { ta.value = text.trim(); ta.dispatchEvent(new Event('input')); }
    if (btn) { btn.innerHTML = '<span>✅</span>PDF'; btn.classList.add('loaded'); }
  } catch(e) {
    if (btn) { btn.innerHTML = '<span>❌</span>PDF'; }
    alert('Errore lettura PDF: ' + e.message);
  }
  input.value = '';
}

(function init(){
  loadAll();
  const key = localStorage.getItem('studyai_key');
  if (!key) {
    document.getElementById('setupOv').style.display = 'flex';
  }
  document.getElementById('setupKeyInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmSetupKey();
  });
  renderProjects();
})();
</script>
