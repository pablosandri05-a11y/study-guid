<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
/* ══════════════════════════════════════════
   DESIGN SYSTEM
══════════════════════════════════════════ */
:root {
  --bg:        #0d1117;
  --surface:   #161b27;
  --surface2:  #1e2636;
  --surface3:  #263045;
  --border:    #2a3547;
  --border2:   #374557;
  --primary:   #14b8a6;
  --primary2:  #0d9488;
  --primary3:  #5eead4;
  --accent:    #818cf8;
  --accent2:   #6366f1;
  --text:      #e2e8f0;
  --text2:     #94a3b8;
  --text3:     #475569;
  --success:   #10b981;
  --warn:      #f59e0b;
  --error:     #ef4444;
  --radius-sm: 8px;
  --radius:    12px;
  --radius-lg: 18px;
  --shadow:    0 4px 24px rgba(0,0,0,0.35);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.25);
  --transition: 0.18s ease;
}

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; line-height: 1.5; }
button { font-family: inherit; cursor: pointer; transition: all var(--transition); }
button:disabled { cursor: not-allowed; opacity: 0.45; }
input, textarea, select { font-family: inherit; color: var(--text); }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

/* ── SCREENS ── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: block; }

/* ══════════════════════════════════════════
   PROJECTS SCREEN
══════════════════════════════════════════ */
.projects-screen { padding: 0; }

.projects-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 32px; border-bottom: 1px solid var(--border);
  background: var(--surface); gap: 16px; flex-wrap: wrap;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-logo {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--primary2), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800; color: #fff;
}
.brand-name { font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
.brand-tag  { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-top: 1px; letter-spacing: 1px; }

.api-pill {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 8px 14px;
}
.api-pill label { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; white-space: nowrap; letter-spacing: 1px; }
.api-pill input {
  background: none; border: none; outline: none; color: var(--text); font-family: 'JetBrains Mono', monospace;
  font-size: 12px; width: 220px;
}
.api-pill input::placeholder { color: var(--text3); }

.projects-body { padding: 40px 32px; max-width: 1100px; margin: 0 auto; }
.projects-hero { margin-bottom: 40px; }
.projects-hero h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
.projects-hero p  { color: var(--text2); font-size: 15px; }

.projects-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;
}
.proj-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 22px; cursor: pointer; transition: all var(--transition);
  display: flex; flex-direction: column; gap: 14px;
}
.proj-card:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: var(--shadow); }
.proj-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.proj-card-icon {
  width: 42px; height: 42px; border-radius: 10px;
  background: linear-gradient(135deg, var(--primary2)33, var(--primary)22);
  border: 1px solid var(--primary2)44;
  display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
}
.proj-card-name { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.3; }
.proj-card-date { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
.proj-card-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
  padding: 3px 9px; color: var(--text2);
}
.chip.teal { background: var(--primary2)22; border-color: var(--primary2)55; color: var(--primary3); }

.new-proj-card {
  background: var(--surface); border: 2px dashed var(--border2); border-radius: var(--radius-lg);
  padding: 22px; cursor: pointer; transition: all var(--transition);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; min-height: 160px; color: var(--text3);
}
.new-proj-card:hover { border-color: var(--primary); color: var(--primary3); transform: translateY(-3px); }
.new-proj-card .plus { font-size: 28px; transition: transform var(--transition); }
.new-proj-card:hover .plus { transform: scale(1.2); }
.new-proj-card span { font-size: 14px; font-weight: 600; }

/* ══════════════════════════════════════════
   PROJECT SCREEN — LAYOUT
══════════════════════════════════════════ */
.proj-screen { display: flex; min-height: 100vh; }

/* sidebar */
.proj-sidebar {
  width: 220px; flex-shrink: 0; background: var(--surface);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
}
.sidebar-header {
  padding: 20px 18px 14px;
  border-bottom: 1px solid var(--border);
}
.sidebar-back {
  display: flex; align-items: center; gap: 8px; color: var(--text2);
  font-size: 13px; font-weight: 500; background: none; border: none;
  padding: 0; margin-bottom: 14px; transition: color var(--transition);
}
.sidebar-back:hover { color: var(--primary3); }
.sidebar-proj-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; word-break: break-word; }

.sidebar-nav { padding: 10px 10px; flex: 1; }
.sidebar-section { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--text3);
  letter-spacing: 1.5px; padding: 10px 8px 4px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: var(--radius-sm); margin-bottom: 2px;
  color: var(--text2); font-size: 13px; font-weight: 500;
  background: none; border: none; width: 100%; text-align: left; cursor: pointer;
  transition: all var(--transition);
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--primary2)22; color: var(--primary3); font-weight: 600; }
.nav-item .ni-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
.nav-item .ni-badge {
  margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 10px;
  background: var(--surface3); border-radius: 99px; padding: 1px 7px; color: var(--text3);
}

.sidebar-footer { padding: 12px 10px; border-top: 1px solid var(--border); }
.sidebar-del-btn {
  display: flex; align-items: center; gap: 8px; width: 100%;
  padding: 8px 12px; border-radius: var(--radius-sm); background: none;
  border: 1px solid transparent; color: var(--text3); font-size: 12px;
  transition: all var(--transition);
}
.sidebar-del-btn:hover { border-color: var(--error)66; color: var(--error); background: var(--error)11; }

/* main content */
.proj-main { flex: 1; min-width: 0; }
.proj-topbar-mobile {
  display: none; padding: 12px 16px; background: var(--surface);
  border-bottom: 1px solid var(--border); align-items: center; gap: 12px;
}
.proj-topbar-mobile .btn-back-mobile {
  display: flex; align-items: center; gap: 6px; color: var(--text2);
  font-size: 13px; background: none; border: none; flex-shrink: 0;
}
.proj-topbar-mobile .btn-back-mobile:hover { color: var(--primary3); }
.tab-select-wrap { flex: 1; position: relative; }
.tab-select {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 9px 36px 9px 14px; color: var(--text);
  font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600;
  cursor: pointer; appearance: none; -webkit-appearance: none;
}
.tab-select:focus { outline: none; border-color: var(--primary); }
.tab-select-arrow { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text2); pointer-events: none; font-size: 11px; }

.proj-content { padding: 32px; }
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; }
.panel-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.panel-sub   { color: var(--text2); font-size: 14px; margin-bottom: 24px; }

/* stats strip */
.stats-strip { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.stat-chip {
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 10px 18px; text-align: center; flex: 1; min-width: 80px;
}
.stat-v { font-size: 20px; font-weight: 700; color: var(--primary3); font-family: 'JetBrains Mono', monospace; }
.stat-l { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

/* ══════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  border: none; border-radius: var(--radius-sm); padding: 10px 18px;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all var(--transition);
}
.btn:hover:not(:disabled) { filter: brightness(1.12); transform: translateY(-1px); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; filter: none; }
.btn-primary { background: linear-gradient(135deg, var(--primary2), var(--primary)); color: #fff; }
.btn-accent  { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #fff; }
.btn-ghost   { background: transparent; border: 1px solid var(--border2); color: var(--text2); }
.btn-ghost:hover:not(:disabled) { border-color: var(--primary); color: var(--primary3); background: var(--primary2)11; }
.btn-danger  { background: linear-gradient(135deg, #991b1b, var(--error)); color: #fff; }
.btn-full    { width: 100%; justify-content: center; padding: 13px; font-size: 15px; }
.btn-gen     { background: linear-gradient(135deg, var(--primary2), #0891b2); color: #fff; font-weight: 700; }
.btn-gen.loading { background: linear-gradient(135deg, #134e4a, #0c4a6e); }
.btn-sm      { padding: 6px 12px; font-size: 12px; }

/* ══════════════════════════════════════════
   FORM ELEMENTS
══════════════════════════════════════════ */
.field { margin-bottom: 16px; }
.field-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.5px; text-transform: uppercase; }
.input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 11px 14px; color: var(--text);
  font-size: 14px; transition: border-color var(--transition);
}
.input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary)22; }
textarea.input { resize: vertical; line-height: 1.65; }

/* ── API key bar ── */
.api-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
.api-bar label { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; white-space: nowrap; letter-spacing: 1px; }
.api-bar .input { flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 12px; }

/* ── Error ── */
.err-box { background: var(--error)18; border: 1px solid var(--error)55; border-radius: var(--radius-sm); padding: 10px 14px; color: #fca5a5; font-family: 'JetBrains Mono', monospace; font-size: 12px; margin-top: 10px; }

/* ── Section label ── */
.sec-label { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.sec-label::after { content:''; flex:1; height:1px; background: var(--border); }

/* ── Empty state ── */
.empty-state { text-align: center; padding: 56px 24px; color: var(--text3); }
.empty-state .ei { font-size: 44px; margin-bottom: 14px; }
.empty-state p  { font-size: 14px; font-family: 'JetBrains Mono', monospace; }

/* ══════════════════════════════════════════
   PDF UPLOAD ZONE
══════════════════════════════════════════ */
.pdf-zone {
  border: 2px dashed var(--border2); border-radius: var(--radius-lg);
  padding: 36px 24px; text-align: center; cursor: pointer;
  transition: all var(--transition); background: var(--surface2); margin-bottom: 16px;
  position: relative;
}
.pdf-zone:hover, .pdf-zone.drag-over { border-color: var(--primary); background: var(--primary2)12; }
.pdf-zone.loading { border-color: var(--primary); pointer-events: none; }
.pdf-zone-icon { font-size: 42px; margin-bottom: 12px; }
.pdf-zone-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.pdf-zone-sub   { font-size: 13px; color: var(--text2); }
.pdf-prog-wrap  { height: 4px; background: var(--border); border-radius: 99px; margin-top: 14px; overflow: hidden; display: none; }
.pdf-prog-bar   { height: 100%; background: linear-gradient(90deg, var(--primary2), var(--primary3)); border-radius: 99px; transition: width 0.3s; }

.pdf-status { display:none; margin-bottom:12px; padding:10px 14px; background: var(--primary2)18; border:1px solid var(--primary2)44; border-radius:var(--radius-sm); color:var(--primary3); font-family:'JetBrains Mono',monospace; font-size:12px; }
.pdf-status.err { background:var(--error)18; border-color:var(--error)55; color:#fca5a5; }

.or-divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:var(--text3); font-family:'JetBrains Mono',monospace; font-size:11px; }
.or-divider::before, .or-divider::after { content:''; flex:1; height:1px; background:var(--border); }

/* doc list */
.doc-item { display:flex; align-items:center; gap:8px; padding:10px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); margin-bottom:8px; }
.doc-item-name { flex:1; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.doc-item-name span { font-size:11px; color:var(--text3); font-family:'JetBrains Mono',monospace; margin-left:6px; }

/* ══════════════════════════════════════════
   CONCEPT MAP
══════════════════════════════════════════ */
.map-wrap { overflow-x:auto; border-radius:var(--radius); }

/* ══════════════════════════════════════════
   FLASHCARDS
══════════════════════════════════════════ */
.fc-scene { perspective: 1000px; min-height: 220px; cursor: pointer; margin-bottom: 8px; }
.fc-card  {
  position: relative; width: 100%; min-height: 220px;
  transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(.4,0,.2,1);
  border-radius: var(--radius-lg);
}
.fc-card.flipped { transform: rotateY(180deg); }
.fc-face {
  position: absolute; inset: 0; backface-visibility: hidden;
  border-radius: var(--radius-lg); padding: 32px 28px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
}
.fc-front { background: linear-gradient(135deg, var(--surface2), var(--surface3)); border: 1.5px solid var(--primary2)55; }
.fc-back  { background: linear-gradient(135deg, #0c2a24, #0c3830); border: 1.5px solid var(--primary); transform: rotateY(180deg); }
.fc-hint  { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; }
.fc-text  { font-size: 18px; font-weight: 600; line-height: 1.55; color: var(--text); }
.fc-counter { text-align:center; color:var(--text3); font-family:'JetBrains Mono',monospace; font-size:12px; margin-bottom:12px; }
.fc-nav { display:flex; justify-content:center; align-items:center; gap:16px; margin-top:20px; }
.dots { display:flex; justify-content:center; gap:5px; margin-top:14px; flex-wrap:wrap; }
.dot { width:7px; height:7px; border-radius:99px; border:none; cursor:pointer; transition:all var(--transition); }

/* ══════════════════════════════════════════
   QUIZ
══════════════════════════════════════════ */
.quiz-block { margin-bottom:18px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
.quiz-q { font-size:15px; font-weight:600; margin-bottom:14px; line-height:1.5; }
.quiz-q-num { color:var(--primary3); font-family:'JetBrains Mono',monospace; margin-right:8px; font-size:13px; }
.opt {
  display:flex; align-items:center; gap:10px;
  width:100%; text-align:left; padding:11px 14px; margin-bottom:8px;
  background:var(--surface3); border:1px solid var(--border2); border-radius:var(--radius-sm);
  color:var(--text2); font-size:14px; cursor:pointer; transition:all var(--transition);
}
.opt:hover:not(:disabled) { border-color:var(--primary); color:var(--text); background:var(--primary2)15; transform:none; filter:none; }
.opt-letter { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text3); width:18px; flex-shrink:0; }
.opt.sel  { background:var(--primary2)25; border-color:var(--primary); color:var(--text); }
.opt.ok   { background:var(--success)20; border-color:var(--success); color:#6ee7b7; }
.opt.bad  { background:var(--error)18;   border-color:var(--error);   color:#fca5a5; }
.opt:disabled { cursor:default; }

.score-card { background:linear-gradient(135deg,var(--success)18,var(--success)08); border:1.5px solid var(--success)55; border-radius:var(--radius-lg); padding:24px; text-align:center; margin-bottom:24px; }
.score-num { font-size:40px; font-weight:800; color:var(--success); font-family:'JetBrains Mono',monospace; }
.score-msg { color:#6ee7b7; margin-top:4px; font-size:14px; }

/* ══════════════════════════════════════════
   SUMMARY
══════════════════════════════════════════ */
.summary-text { color:var(--text2); line-height:1.85; font-size:15px; white-space:pre-wrap; }

/* ══════════════════════════════════════════
   BANK / OPEN QUESTIONS
══════════════════════════════════════════ */
.filter-bar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
.f-btn { padding:6px 14px; border-radius:99px; border:1px solid var(--border2); background:transparent; color:var(--text2); font-family:'JetBrains Mono',monospace; font-size:11px; transition:all var(--transition); }
.f-btn:hover { border-color:var(--primary); color:var(--primary3); transform:none; filter:none; }
.f-btn.active { background:var(--primary2); border-color:var(--primary2); color:#fff; }

.bank-item { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px 16px; margin-bottom:10px; }
.bank-item-q { font-size:14px; color:var(--text); margin-bottom:8px; line-height:1.4; }
.bank-item-meta { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.badge { font-family:'JetBrains Mono',monospace; font-size:10px; border-radius:5px; padding:2px 8px; border:1px solid; font-weight:600; }
.badge-ok  { background:var(--success)18; border-color:var(--success)55; color:#6ee7b7; }
.badge-rev { background:var(--warn)15;    border-color:var(--warn)55;    color:#fcd34d; }
.badge-new { background:var(--accent)15;  border-color:var(--accent)55;  color:#c7d2fe; }
.bank-acc  { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--primary3); }

.open-item { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:10px; cursor:pointer; transition:all var(--transition); }
.open-item:hover { border-color:var(--primary); transform:translateY(-1px); }
.open-item-q { font-size:14px; font-weight:600; margin-bottom:6px; }
.open-item-sub { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--primary3); }
.sugg-box { background:var(--primary2)18; border:1px solid var(--primary2)44; border-radius:var(--radius-sm); padding:14px; margin-bottom:14px; }
.sugg-lbl  { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--primary3); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.sugg-text { color:var(--text2); font-size:14px; line-height:1.6; }

.rating-row { display:flex; align-items:center; gap:10px; margin-top:12px; flex-wrap:wrap; }
.r-star { width:38px; height:38px; border-radius:var(--radius-sm); border:1px solid var(--border2); background:var(--surface3); color:var(--text2); font-size:15px; font-weight:700; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all var(--transition); font-family:'JetBrains Mono',monospace; }
.r-star:hover { border-color:var(--primary); color:var(--primary3); transform:translateY(-1px); filter:none; }
.r-star.sel { background:var(--primary2); border-color:var(--primary); color:#fff; }

/* ══════════════════════════════════════════
   TEST
══════════════════════════════════════════ */
.test-hdr { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
.timer { font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; color:var(--primary3); background:var(--surface2); border:1.5px solid var(--border); border-radius:var(--radius-sm); padding:8px 16px; }
.timer.warn   { color:var(--warn);  border-color:var(--warn)66; }
.timer.danger { color:var(--error); border-color:var(--error)66; }
.test-prog { font-family:'JetBrains Mono',monospace; font-size:14px; color:var(--text2); }
.test-dots { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:16px; }
.tdot { width:30px; height:30px; border-radius:var(--radius-sm); border:1px solid var(--border2); background:var(--surface2); color:var(--text3); font-size:10px; font-family:'JetBrains Mono',monospace; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all var(--transition); }
.tdot:hover { border-color:var(--primary); color:var(--primary3); filter:none; transform:none; }
.tdot.ans  { background:var(--primary2)30; border-color:var(--primary); color:var(--primary3); }
.tdot.curr { background:var(--primary2); border-color:var(--primary3); color:#fff; font-weight:700; }
.tdot.oq   { background:var(--accent2)18; border-color:var(--accent)55; color:#c7d2fe; }
.tdot.oq.ans  { background:var(--accent2)40; border-color:var(--accent); color:#e0e7ff; }
.tdot.oq.curr { background:var(--accent2); border-color:var(--accent); color:#fff; }
.open-ans { width:100%; min-height:120px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px; color:var(--text); font-size:14px; resize:vertical; margin-bottom:12px; transition:border-color var(--transition); }
.open-ans:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary)22; }

.final-card { background:linear-gradient(135deg,var(--primary2)20,var(--surface2)); border:2px solid var(--primary2)55; border-radius:var(--radius-lg); padding:28px; text-align:center; margin-bottom:24px; }
.final-num { font-size:56px; font-weight:800; color:var(--primary3); font-family:'JetBrains Mono',monospace; line-height:1; }
.final-sub { color:var(--text2); font-size:14px; margin-top:8px; }
.err-item { background:var(--error)12; border:1px solid var(--error)33; border-radius:var(--radius-sm); padding:12px; margin-bottom:8px; }
.err-q    { color:#fca5a5; font-size:13px; margin-bottom:5px; }
.err-ok   { color:#6ee7b7; font-size:12px; font-family:'JetBrains Mono',monospace; }

/* ══════════════════════════════════════════
   PROGRESS
══════════════════════════════════════════ */
.prog-grid { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
.prog-cell { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:14px 20px; text-align:center; flex:1; min-width:90px; }

.prog-l { font-size:10px; font-family:'JetBrains Mono',monospace; color:var(--text3); text-transform:uppercase; letter-spacing:1px; margin-top:3px; }
.chart-wrap { overflow-x:auto; border-radius:var(--radius-sm); }

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); z-index:300; align-items:center; justify-content:center; padding:16px; }
.modal-bg.on { display:flex; }
.modal-box { background:var(--surface); border:1px solid var(--border2); border-radius:var(--radius-lg); padding:28px; max-width:440px; width:100%; box-shadow:var(--shadow); }
.modal-box h2 { font-size:18px; font-weight:700; margin-bottom:18px; }

/* ══════════════════════════════════════════
   EXAM TYPE / COUNTDOWN
══════════════════════════════════════════ */
.exam-type-badge { font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:700; padding:2px 9px; border-radius:5px; letter-spacing:0.5px; text-transform:uppercase; }
.et-orale   { background:#6366f115; border:1px solid #6366f155; color:#a5b4fc; }
.et-scritto { background:#14b8a615; border:1px solid #14b8a655; color:#5eead4; }
.et-misto   { background:#f59e0b15; border:1px solid #f59e0b55; color:#fcd34d; }
.et-laboratorio { background:#10b98115; border:1px solid #10b98155; color:#6ee7b7; }

.countdown { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; }
.cd-urgent { color:#ef4444; }
.cd-soon   { color:#f59e0b; }
.cd-ok     { color:#5eead4; }

/* oral practice */
.oral-q-card { background:linear-gradient(135deg,var(--accent2)15,var(--surface2)); border:2px solid var(--accent2)44; border-radius:var(--radius-lg); padding:32px; text-align:center; margin-bottom:20px; }
.oral-q-text { font-size:20px; font-weight:700; line-height:1.55; color:var(--text); margin-bottom:8px; }

.cfg-btns { display:flex; gap:6px; flex-wrap:wrap; }
.cfg-btn { padding:6px 14px; border-radius:6px; border:1px solid var(--border2); background:transparent; color:var(--text2); font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; cursor:pointer; transition:all var(--transition); }
.cfg-btn:hover { border-color:var(--primary); color:var(--primary3); }
.cfg-btn.active { background:var(--primary2); border-color:var(--primary); color:#fff; }

/* ══════════════════════════════════════════

<!-- ══════════════ MODAL ══════════════ -->

    <div id="modalBody"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   SYSTEM PROMPT
═══════════════════════════════════════════════ */
const SYS = `You are an expert university study coach AI. Given input text (lecture notes, textbook chapters, articles, slides), generate a comprehensive study set in JSON format.
Return ONLY valid JSON — no markdown, no backticks, no explanation.

{
  "map": { "nodes": [{"id":"0","label":"Main Topic","parentId":null},{"id":"1","label":"Subtopic","parentId":"0"}] },
  "flashcards": [{"front":"Term or concept","back":"Definition, explanation or key facts"}],
  "quiz": [{"question":"...","options":["A","B","C","D"],"correct":0}],
  "openQuestions": [{"question":"Explain in detail...","suggestedAnswer":"A complete answer should include: 1)... 2)... 3)..."}],
  "summary": "3-5 paragraph summary."
}

Rules:
- map: 8-14 nodes, one root (parentId null), labels max 4 words, capture key hierarchical concepts
- flashcards: 8-15 cards — mix definitions, dates, formulas, key distinctions as appropriate for the subject
- quiz: EXACTLY 30 multiple choice questions, varied difficulty (easy/medium/hard), "correct" is index 0-3; questions should be university-exam-style
- openQuestions: EXACTLY 5 open questions with DETAILED suggested answers (as if written by a professor for oral/written exam preparation); each answer should be 3-6 sentences
- summary: 3-5 paragraphs covering the most important points for exam preparation
- Respond in the SAME LANGUAGE as the input text
- For oral-exam style subjects (law, philosophy, history, medicine, literature) make open questions require argumentation
- For quantitative subjects (math, physics, engineering, statistics) include formula-based questions`;

const NAV = [
  { section: 'Contenuto' },
  { id:'genera',    icon:'✨', label:'Genera',    badge: null },
  { id:'map',       icon:'🗺', label:'Mappa',     badge: null },
  { id:'flashcards',icon:'🃏', label:'Flashcard', badge: null },
  { id:'quiz',      icon:'❓', label:'Quiz rapido', badge: null },
  { id:'summary',   icon:'📝', label:'Riassunto', badge: null },
  { section: 'Simulazione esame' },
  { id:'bank',      icon:'🗃', label:'Banca',     badge: null },
  { id:'open',      icon:'✍️', label:'Aperte',    badge: null },
  { id:'oral',      icon:'🎤', label:'Orale',     badge: null },
  { id:'test',      icon:'📋', label:'Test scritto', badge: null },
  { id:'progress',  icon:'📈', label:'Progressi', badge: null },
];

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let projects = [];
let projId   = null;

const ps = {
  tab:'genera', studySet:null,
  fcIdx:0, fcFlip:false,
  qAns:{}, qDone:false,
  bankF:'all',
  openSel:null, openRating:0,
  testActive:false, testDone:false, testResults:null,
  testQs:[], testIdx:0,
  tAns:{}, tOpenTxt:{}, tOpenRating:{}, tShowSugg:{},
  timerSec:1800, timerRef:null,
  testCfgQ:30, testCfgT:30, testCfgMode:'scritto',
  oralIdx:0, oralRevealedMap:{}, oralRating:0, oralActive:false, oralDone:false, oralResults:[],
};

/* ═══════════════════════════════════════════════
   STORAGE
═══════════════════════════════════════════════ */
function save()    { localStorage.setItem('studyai_v3', JSON.stringify(projects)); }
function loadAll() { const r = localStorage.getItem('studyai_v3'); projects = r ? JSON.parse(r) : []; }
function proj()    { return projects.find(p => p.id === projId); }

/* ═══════════════════════════════════════════════
   SCREENS
═══════════════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('sc-' + id).classList.add('active');
}

function goToProjects() {
  killTimer(); projId = null;
  showScreen('projects'); renderProjects();
}

function openProj(id) {
  projId = id;
  const p = projects.find(pr=>pr.id===id);
  Object.assign(ps, {
    tab:'genera', studySet: p?.studySet||null, fcIdx:0, fcFlip:false,
    qAns:{}, qDone:false, bankF:'all', openSel:null, openRating:0,
    testActive:false, testDone:false, testResults:null,
    testQs:[], testIdx:0, tAns:{}, tOpenTxt:{}, tOpenRating:{}, tShowSugg:{},
    timerSec:1800, testCfgQ:30, testCfgT:30, testCfgMode:'scritto',
    oralIdx:0, oralRevealedMap:{}, oralRating:0, oralActive:false, oralDone:false, oralResults:[],
  });
  killTimer();
  showScreen('project');
  renderProj();
}

/* ═══════════════════════════════════════════════
   PROJECTS
═══════════════════════════════════════════════ */
function examCountdown(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr), now = new Date();
  d.setHours(0,0,0,0); now.setHours(0,0,0,0);
  const days = Math.round((d - now) / 86400000);
  if (days < 0)  return `<span class="countdown cd-past">esame passato</span>`;
  if (days === 0) return `<span class="countdown cd-urgent">📅 OGGI!</span>`;
  if (days <= 7)  return `<span class="countdown cd-urgent">📅 ${days} giorni</span>`;
  if (days <= 30) return `<span class="countdown cd-soon">📅 ${days} giorni</span>`;
  return `<span class="countdown cd-ok">📅 ${days} giorni</span>`;
}
function examTypeBadge(type) {
  const m = {orale:'🎤 Orale',scritto:'📝 Scritto',misto:'🔄 Misto',laboratorio:'🔬 Lab'};
  return `<span class="exam-type-badge et-${type||'scritto'}">${m[type]||'📝 Scritto'}</span>`;
}
function renderProjects() {
  const g = document.getElementById('projectsGrid');
  const emojis = ['📚','📖','🧪','📐','🏛','🧬','💻','🌍','🎨','📊','⚖️','🏥','🧮','🎭','🌱'];
  g.innerHTML = projects.map((p,pi) => `
    <div class="proj-card" onclick="openProj('${p.id}')">
      <div class="proj-card-header">
        <div class="proj-card-icon">${emojis[pi % emojis.length]}</div>
        <div style="flex:1;min-width:0;">
          <div class="proj-card-name">${h(p.name)}</div>
          <div class="proj-card-date" style="display:flex;gap:6px;align-items:center;margin-top:4px;flex-wrap:wrap;">
            ${examTypeBadge(p.examType)}
            ${examCountdown(p.examDate)}
          </div>
        </div>
      </div>
      <div class="proj-card-badges">
        <span class="chip teal">📄 ${(p.docs||[]).length} doc</span>
        <span class="chip teal">🗃 ${(p.bank||[]).length} dom.</span>
        <span class="chip">📈 ${(p.history||[]).length} test</span>
        ${p.studySet ? '<span class="chip teal">✅ Set pronto</span>' : ''}
      </div>
    </div>`).join('') + `
  <div class="new-proj-card" onclick="createProj()">
    <div class="plus">+</div>
    <span>Nuovo progetto</span>
  </div>`;
}

function createProj() {
  modal('Nuovo progetto', `
    <div class="field">
      <label class="field-label">Materia / Argomento</label>
      <input id="pname" class="input" placeholder="Es: Psicometria, Diritto privato, Analisi II...">
    </div>
    <div class="field">
      <label class="field-label">Tipo di esame</label>
      <select id="ptype" class="input">
        <option value="scritto">📝 Scritto (crocette / domande)</option>
        <option value="orale">🎤 Orale</option>
        <option value="misto">🔄 Misto (scritto + orale)</option>
        <option value="laboratorio">🔬 Laboratorio / Progetto</option>
      </select>
    </div>
    <div class="field">
      <label class="field-label">Data esame (opzionale)</label>
      <input id="pdate" type="date" class="input">
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px;">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Annulla</button>
      <button class="btn btn-primary btn-sm" onclick="confirmCreate()">Crea progetto</button>
    </div>`);
  setTimeout(() => document.getElementById('pname')?.focus(), 80);
}

function confirmCreate() {
  const name = document.getElementById('pname')?.value.trim();
  if (!name) return;
  const examType = document.getElementById('ptype')?.value || 'scritto';
  const examDate = document.getElementById('pdate')?.value || null;
  const p = { id:uid(), name, examType, examDate, createdAt:new Date().toISOString(), docs:[], bank:[], openQs:[], history:[], studySet:null };
  projects.push(p); save(); closeModal(); openProj(p.id);
}

function editProjSettings() {
  const p = proj(); if (!p) return;
  modal('Impostazioni progetto', `
    <div class="field">
      <label class="field-label">Tipo di esame</label>
      <select id="eType" class="input">
        <option value="scritto" ${p.examType==='scritto'?'selected':''}>📝 Scritto</option>
        <option value="orale"   ${p.examType==='orale'?'selected':''}>🎤 Orale</option>
        <option value="misto"   ${p.examType==='misto'?'selected':''}>🔄 Misto</option>
        <option value="laboratorio" ${p.examType==='laboratorio'?'selected':''}>🔬 Laboratorio</option>
      </select>
    </div>
    <div class="field">
      <label class="field-label">Data esame</label>
      <input id="eDate" type="date" class="input" value="${p.examDate||''}">
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px;">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Annulla</button>
      <button class="btn btn-primary btn-sm" onclick="saveSettings()">Salva</button>
    </div>`);
}
function saveSettings() {
  const p = proj(); if (!p) return;
  p.examType = document.getElementById('eType')?.value || p.examType;
  p.examDate = document.getElementById('eDate')?.value || null;
  save(); closeModal(); renderProj();
}

function deleteProject() {
  const p = proj(); if (!p) return;
  modal('Elimina progetto', `
    <p style="color:#fca5a5;margin-bottom:18px;">Eliminare <strong>${h(p.name)}</strong>? L'azione è irreversibile.</p>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Annulla</button>
      <button class="btn btn-danger btn-sm" onclick="confirmDelete()">Elimina</button>
    </div>`);
}
function confirmDelete() { projects=projects.filter(p=>p.id!==projId); save(); closeModal(); goToProjects(); }

/* ═══════════════════════════════════════════════
   PROJECT SCREEN
═══════════════════════════════════════════════ */
function renderProj() {
  const p = proj(); if (!p) return;
  const sn = document.getElementById('sidebarProjName');
  if(sn) {
    sn.innerHTML = `<div style="font-size:15px;font-weight:700;word-break:break-word;">${h(p.name)}</div>
      <div style="margin-top:5px;display:flex;gap:5px;flex-wrap:wrap;">
        ${examTypeBadge(p.examType)}
        ${p.examDate?`<span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);">${p.examDate}</span>`:''}
      </div>`;
  }
  renderNav(); renderProjContent();
}

function renderNav() {
  const p = proj();
  // sidebar
  const nav = document.getElementById('sidebarNav');
  if (nav) {
    nav.innerHTML = NAV.map(item => {
      if (item.section) return `<div class="sidebar-section">${item.section}</div>`;
      let badge = '';
      if (item.id==='bank') badge = (p.bank||[]).length;
      if (item.id==='open') badge = (p.openQs||[]).length;
      if (item.id==='test') badge = (p.history||[]).length;
      const badgeH = badge ? `<span class="ni-badge">${badge}</span>` : '';
      return `<button class="nav-item ${ps.tab===item.id?'active':''}" onclick="switchTab('${item.id}')">
        <span class="ni-icon">${item.icon}</span>${item.label}${badgeH}
      </button>`;
    }).join('');
  }
  // select mobile
  const sel = document.getElementById('projTabSelect');
  if (sel) {
    sel.innerHTML = NAV.filter(i=>i.id).map(t=>
      `<option value="${t.id}" ${ps.tab===t.id?'selected':''}>${t.icon} ${t.label}</option>`).join('');
  }
}

function switchTab(id) {
  ps.tab = id;
  if (id==='flashcards') { ps.fcIdx=0; ps.fcFlip=false; }
  if (id==='quiz') { ps.qAns={}; ps.qDone=false; }
  if (id==='test' && ps.testDone) { ps.testDone=false; ps.testResults=null; ps.testActive=false; }
  renderNav(); renderProjContent();
  document.getElementById('projStats').style.display = 'none';
}

function renderProjContent() {
  const panel = document.getElementById('projPanel');
  const tabs = {genera:tabGenera,map:tabMap,flashcards:tabFC,quiz:tabQuiz,summary:tabSum,bank:tabBank,open:tabOpen,oral:tabOral,test:tabTest,progress:tabProg};
  panel.innerHTML = (tabs[ps.tab]||emptyTab)();
  if (ps.tab==='genera') wireGenera();
}

/* ═══════════════════════════════════════════════
   TAB: GENERA
═══════════════════════════════════════════════ */
function tabGenera() {
  const p = proj();
  const key = h(localStorage.getItem('studyai_key')||'');

function pdfOver(e)  { e.preventDefault(); document.getElementById('pdfZone')?.classList.add('drag-over'); }
function pdfLeave(e) { document.getElementById('pdfZone')?.classList.remove('drag-over'); }
function pdfDrop(e)  {
  e.preventDefault(); document.getElementById('pdfZone')?.classList.remove('drag-over');
  const f = e.dataTransfer.files?.[0];
  if (f?.type==='application/pdf') handlePDF({files:[f]},true);
}

async function handlePDF(input, autoGen=false) {
  const file = input.files?.[0]; if (!file) return;
  const zone=document.getElementById('pdfZone'), st=document.getElementById('pdfStatus');
  const bar=document.getElementById('pdfProgBar'), wrap=document.getElementById('pdfProgWrap');
  if(zone) zone.classList.add('loading');
  if(st)   { st.className='pdf-status'; st.style.display='block'; st.textContent=`⏳ Lettura "${file.name}"...`; }
  if(wrap) wrap.style.display='block';
  if(bar)  bar.style.width='8%';
  try {
    const text = await readPDF(file, pct=>{ if(bar) bar.style.width=pct+'%'; });
    const p=proj(); if(!p.docs) p.docs=[];
    if(!p.docs.find(d=>d.name===file.name)) { p.docs.push({id:uid(),name:file.name,text}); save(); }
    if(bar) bar.style.width='100%';
    if(st)  st.textContent=`✅ "${file.name}" — ${text.length.toLocaleString()} caratteri${autoGen?' · Generazione in corso...':' · pronto'}`;
    const ta=document.getElementById('inputText');
    if(ta) { ta.value=text; ta.dispatchEvent(new Event('input')); }
    if(autoGen) await doGenerate();
    else renderProjContent();
  } catch(e) {
    if(st) { st.className='pdf-status err'; st.textContent='⚠ '+e.message; }
  } finally {
    if(zone) zone.classList.remove('loading');
    setTimeout(()=>{ if(wrap) wrap.style.display='none'; },1500);
    try { input.value=''; } catch(_){}
  }
}

async function readPDF(file, onProg) {
  const lib = window['pdfjs-dist/build/pdf'] || window.pdfjsLib;
  if (!lib) throw new Error('PDF.js non disponibile — controlla la connessione');
  lib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const buf=await file.arrayBuffer();
  const pdf=await lib.getDocument({data:buf}).promise;
  const maxP=Math.min(pdf.numPages,30); const parts=[];
  for(let i=1;i<=maxP;i++){
    const pg=await pdf.getPage(i);
    const ct=await pg.getTextContent();
    parts.push(ct.items.map(x=>x.str).join(' ').trim());
    if(onProg) onProg(Math.round(8+(i/maxP)*82));
  }
  const text=parts.filter(Boolean).join('\n\n').trim();
  if(!text) throw new Error('Nessun testo trovato — il PDF potrebbe essere una scansione (immagini)');
  return text;
}

   API CALL
═══════════════════════════════════════════════ */
async function doGenerate() {
  const key  = (document.getElementById('apiKeyP')?.value||localStorage.getItem('studyai_key')||'').trim();
  const text = document.getElementById('inputText')?.value?.trim(); if(!text) return;
  const btn=document.getElementById('genBtn'), err=document.getElementById('errBox');
  if(!key) {
    if(err) { err.style.display='block'; err.textContent='⚠ Inserisci la tua API key Anthropic nel campo in alto prima di generare.'; }
    return;
  }
  if(btn) { btn.disabled=true; btn.classList.add('loading'); btn.textContent='⏳ Generazione in corso...'; }
  if(err)   err.style.display='none';
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','x-api-key':key},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:8000,system:SYS,messages:[{role:'user',content:text}]}),
    });
    if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||'HTTP '+res.status); }
    const data=await res.json();
    const raw=data.content[0].text.replace(/```json|```/g,'').trim();
    ps.studySet=JSON.parse(raw);
    ps.qAns={}; ps.qDone=false;
    const src=text.slice(0,50)+'…';
    mergeBankQ(ps.studySet.quiz||[],src);
    mergeOpenQ(ps.studySet.openQuestions||[],src);
    const p=proj(); if(p) p.studySet=ps.studySet;
    save(); renderProj(); showStats();
  } catch(e) {
    if(err) { err.style.display='block'; err.textContent='⚠ '+e.message; }
  }
  if(btn) { btn.disabled=false; btn.classList.remove('loading'); btn.textContent='✨ Genera set di studio'; }
  const ta=document.getElementById('inputText');
  if(btn&&ta) btn.disabled=!ta.value.trim();
}

function mergeBankQ(qs,src) {
  const p=proj(); if(!p.bank) p.bank=[];
  const ex=new Set(p.bank.map(q=>q.question.trim().toLowerCase()));
  let n=0;
  for(const q of qs){
    if(ex.has(q.question.trim().toLowerCase())) continue;
    p.bank.push({id:uid(),question:q.question,options:q.options,correct:q.correct,src,createdAt:new Date().toISOString(),timesAns:0,timesOk:0});
    ex.add(q.question.trim().toLowerCase());
    if(++n>=30) break;
  }
}
function mergeOpenQ(qs,src) {
  const p=proj(); if(!p.openQs) p.openQs=[];
  const ex=new Set(p.openQs.map(q=>q.question.trim().toLowerCase()));
  for(const q of qs){
    if(ex.has(q.question.trim().toLowerCase())) continue;
    p.openQs.push({id:uid(),question:q.question,suggestedAnswer:q.suggestedAnswer,src,createdAt:new Date().toISOString(),attempts:[]});
    ex.add(q.question.trim().toLowerCase());
  }
}
function showStats() {
  if(!ps.studySet) return;
  const bar=document.getElementById('projStats'); bar.style.display='flex';
  bar.innerHTML=[

function tabMap() {
  if(!ps.studySet?.map?.nodes?.length) return `<div class="panel-title">Mappa concettuale</div>${empty('🗺','Genera prima un set di studio')}`;
  return `<div class="panel-title">Mappa concettuale</div><div class="panel-sub">Struttura gerarchica degli argomenti</div>`+buildMap(ps.studySet.map.nodes);
}
function buildMap(nodes) {
  const nm={};
  nodes.forEach(n=>(nm[n.id]={...n,ch:[]}));
  nodes.forEach(n=>{if(n.parentId!=null&&nm[n.parentId])nm[n.parentId].ch.push(n.id);});
  const W=740,H=490,cx=W/2,cy=H/2,R=[0,148,272,368];
  const lvl={},vis=new Set();
  const q=nodes.filter(n=>n.parentId==null).map(n=>({id:n.id,l:0}));
  while(q.length){const{id,l}=q.shift();if(vis.has(id))continue;vis.add(id);if(!lvl[l])lvl[l]=[];lvl[l].push(id);(nm[id]?.ch||[]).forEach(c=>q.push({id:c,l:l+1}));}
  const pos={};
  Object.entries(lvl).forEach(([lv,ids])=>{
    const r=R[Math.min(+lv,R.length-1)];
    ids.forEach((id,i)=>{const a=(2*Math.PI*i/ids.length)-Math.PI/2;pos[id]={x:+lv===0?cx:cx+r*Math.cos(a),y:+lv===0?cy:cy+r*Math.sin(a),lv:+lv};});
  });
  const CLR=['#0d9488','#6366f1','#10b981','#f59e0b'];
  const edges=nodes.filter(n=>n.parentId!=null&&pos[n.id]&&pos[n.parentId])
    .map(n=>`<line x1="${pos[n.parentId].x}" y1="${pos[n.parentId].y}" x2="${pos[n.id].x}" y2="${pos[n.id].y}" stroke="#2a3547" stroke-width="1.5"/>`).join('');
  const ns=nodes.map(n=>{
    const p=pos[n.id];if(!p)return'';
    const c=CLR[Math.min(p.lv,CLR.length-1)],root=p.lv===0;
    const w=root?136:112,hh=root?42:32;
    const lbl=n.label.length>18?n.label.slice(0,16)+'…':n.label;
    return `<g transform="translate(${p.x},${p.y})">
      <rect x="${-w/2}" y="${-hh/2}" width="${w}" height="${hh}" rx="${root?10:8}" fill="${c}" opacity="${root?1:0.85}" stroke="${root?'#5eead4':c}" stroke-width="${root?2:1}"/>
      ${root?`<rect x="${-w/2}" y="${-hh/2}" width="${w}" height="${hh}" rx="10" fill="none" stroke="#5eead4" stroke-width="1" opacity="0.25" transform="scale(1.07)"/>`:''}
      <text text-anchor="middle" dy="0.4em" fill="white" font-size="${root?12:10}" font-family="Inter,sans-serif" font-weight="${root?700:500}">${x(lbl)}</text>
    </g>`;
  }).join('');
  return `<div class="map-wrap"><svg viewBox="0 0 ${W} ${H}" style="width:100%;max-height:460px">
    <defs><radialGradient id="mg"><stop offset="0%" stop-color="#1e2636"/><stop offset="100%" stop-color="#0d1117"/></radialGradient></defs>
    <rect width="${W}" height="${H}" fill="url(#mg)" rx="12"/>
    ${edges}${ns}
  </svg></div>`;
}

function tabQuiz() {
  const qs=ps.studySet?.quiz;
  if(!qs?.length) return `<div class="panel-title">Quiz rapido</div>${empty('❓','Genera prima un set di studio')}`;
  const sc=ps.qDone?qs.filter((q,i)=>ps.qAns[i]===q.correct).length:0;
  const scoreH=ps.qDone?`<div class="score-card"><div class="score-num">${sc}/${qs.length}</div>
    <div class="score-msg">${sc===qs.length?'Perfetto! 🎉':sc>=qs.length*0.7?'Ottimo lavoro! 👍':"Ripassare ancora 📚"}</div></div>`:'';
  const qH=qs.map((q,qi)=>{
    const opts=q.options.map((o,oi)=>{
      let c='opt';
      if(ps.qDone){if(oi===q.correct)c+=' ok';else if(ps.qAns[qi]===oi)c+=' bad';}
      else if(ps.qAns[qi]===oi)c+=' sel';
      return `<button class="${c}" onclick="qAns(${qi},${oi})" ${ps.qDone?'disabled':''}><span class="opt-letter">${['A','B','C','D'][oi]}</span>${h(o)}</button>`;
    }).join('');
    return `<div class="quiz-block"><div class="quiz-q"><span class="quiz-q-num">${qi+1}.</span>${h(q.question)}</div>${opts}</div>`;
  }).join('');
  const ans=Object.keys(ps.qAns).length;
  const btn=!ps.qDone
    ?`<button class="btn btn-primary btn-full" onclick="qSubmit()" ${ans<qs.length?'disabled':''}>Controlla risposte (${ans}/${qs.length})</button>`
    :`<button class="btn btn-ghost btn-full" onclick="qRetry()">🔄 Riprova quiz</button>`;
  return `<div class="panel-title">Quiz rapido</div><div class="panel-sub">${qs.length} domande a scelta multipla</div>`+scoreH+qH+btn;
}

function tabBank() {
  const p=proj(),bank=p.bank||[];
  if(!bank.length) return `<div class="panel-title">Banca domande</div>${empty('🗃','Genera un set di studio per popolare la banca')}`;
  const fil=bank.filter(q=>{
    if(ps.bankF==='ok')  return isMastered(q);
    if(ps.bankF==='rev') return !isMastered(q)&&q.timesAns>0;
    return true;
  });
  const okN=bank.filter(isMastered).length, revN=bank.filter(q=>!isMastered(q)&&q.timesAns>0).length;
  const fb=`<div class="filter-bar">
    <button class="f-btn ${ps.bankF==='all'?'active':''}" onclick="setBankF('all')">Tutte (${bank.length})</button>
    <button class="f-btn ${ps.bankF==='rev'?'active':''}" onclick="setBankF('rev')">Da rivedere (${revN})</button>
    <button class="f-btn ${ps.bankF==='ok'?'active':''}"  onclick="setBankF('ok')">Padroneggiate (${okN})</button>
  </div>`;
  if(!fil.length) return `<div class="panel-title">Banca domande</div>${fb}<div class="empty-state"><div class="ei">🔍</div><p>Nessuna domanda in questa categoria</p></div>`;
  const list=fil.map(q=>{
    const pct=q.timesAns>0?Math.round(q.timesOk/q.timesAns*100):null;
    const bd=isMastered(q)?`<span class="badge badge-ok">✅ Padroneggiata</span>`
      :q.timesAns===0?`<span class="badge badge-new">Nuova</span>`
      :`<span class="badge badge-rev">⚠ Rivedere</span>`;
    const acc=pct!==null?`<span class="bank-acc">${pct}% su ${q.timesAns} risp.</span>`:'';
    return `<div class="bank-item"><div class="bank-item-q">${h(q.question)}</div><div class="bank-item-meta">${bd}${acc}</div></div>`;
  }).join('');
  return `<div class="panel-title">Banca domande</div><div class="panel-sub">${bank.length} domande accumulate</div>${fb}${list}`;
}
function isMastered(q){ return q.timesAns>=3&&(q.timesOk/q.timesAns)>=0.8; }

  const hist=att.length?`<div class="sec-label" style="margin-top:20px;">Storico tentativi</div>

  return `

    <textarea id="openNotes" class="input" rows="3" placeholder="Note opzionali sulla tua risposta..."></textarea>

      ${stars}
      <button class="btn btn-primary btn-sm" onclick="saveOR(${idx})" ${!ps.openRating?'disabled':''}>Salva valutazione</button>

}
function selOpen(i)  { ps.openSel=i;ps.openRating=0;renderProjContent(); }
function setOR(n)    { ps.openRating=n;renderProjContent(); }
function saveOR(idx) {
  const p=proj(),q=p.openQs[idx]; if(!q.attempts) q.attempts=[];

}
function miniChart(att) {
  const W=460,H=90,px=24,py=14;
  const pts=att.map((a,i)=>({x:px+(i/(att.length-1))*(W-px*2),y:H-py-((a.rating-1)/4)*(H-py*2),r:a.rating}));

}

/* ═══════════════════════════════════════════════
   TAB: SIMULAZIONE ORALE
═══════════════════════════════════════════════ */
function tabOral() {
  const p = proj();
  const allQs = [...(p.openQs||[])];
  // also use bank questions as verbal questions
  const bankAsOral = (p.bank||[]).slice(0,10).map(q=>({
    id:q.id, question:q.question, suggestedAnswer:`Risposta corretta: ${q.options?.[q.correct]||''}`, type:'mcq_oral'
  }));
  const pool = [...allQs.map(q=>({...q,type:'open'})), ...bankAsOral];
  if (!pool.length) return `<div class="panel-title">Simulazione esame orale</div>${empty('🎤','Genera un set di studio per avere domande per il simulatore orale')}`;
  if (ps.oralDone) return oralResults();
  if (ps.oralActive) return oralInProgress(pool);
  return oralStart(pool);
}

function oralStart(pool) {
  const p = proj();
  const n = pool.length;
  return `
    <div class="panel-title">Simulazione esame orale</div>
    <div class="panel-sub">Il professore ti fa una domanda — rispondi a mente, poi guarda la risposta e datti un voto</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:24px 0;">
      <div class="stat-chip"><div class="stat-v">${n}</div><div class="stat-l">domande</div></div>
      <div class="stat-chip"><div class="stat-v">${(p.openQs||[]).length}</div><div class="stat-l">aperte</div></div>
      <div class="stat-chip"><div class="stat-v">Verbale</div><div class="stat-l">formato</div></div>
    </div>

      <div style="font-size:13px;color:#c7d2fe;margin-bottom:6px;font-weight:600;">🎤 Come funziona la simulazione orale:</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.7;">
        1. Leggi la domanda e rispondi a voce o mentalmente<br>

    <button class="btn btn-accent btn-full" onclick="startOral()" style="font-size:16px;padding:15px;">🎤 Inizia simulazione orale</button>`;
}

function startOral() {
  const p = proj();
  const allQs = [...(p.openQs||[]).map(q=>({...q,type:'open'}))];
  const bankAsOral = shuffle([...(p.bank||[])]).slice(0,10).map(q=>({
    id:q.id, question:q.question, suggestedAnswer:`Risposta corretta: ${q.options?.[q.correct]||''}. Opzioni: ${(q.options||[]).join(' / ')}`, type:'mcq_oral'
  }));
  const pool = shuffle([...allQs, ...bankAsOral]);
  ps._oralPool = pool;
  ps.oralIdx = 0; ps.oralRevealedMap = {}; ps.oralRating = 0;
  ps.oralActive = true; ps.oralDone = false; ps.oralResults = [];
  renderProjContent();
}

function oralInProgress(pool) {
  const oPool = ps._oralPool || pool;
  if (!oPool?.length) return oralStart(pool);
  const q = oPool[ps.oralIdx];
  const tot = oPool.length;
  const dotH = oPool.map((_,i)=>{
    const done = ps.oralResults[i]?.rating;
    const curr = i === ps.oralIdx;
    return `<div class="tdot${curr?' curr':''}${done&&!curr?' ans':''}" onclick="oralGo(${i})" style="cursor:pointer;">${i+1}</div>`;
  }).join('');

  const revealed = !!(ps.oralRevealedMap[ps.oralIdx] || ps.oralResults[ps.oralIdx]?.rating);
  const stars = [1,2,3,4,5].map(n=>`<button class="r-star ${ps.oralRating===n?'sel':''}" onclick="setOralRating(${n})">${n}</button>`).join('');

  return `
    <div class="test-hdr" style="margin-bottom:20px;">
      <div style="font-size:14px;font-weight:700;color:#a5b4fc;">🎤 Simulazione orale</div>
      <div class="test-prog">${ps.oralIdx+1} / ${tot}</div>
      <button class="btn btn-ghost btn-sm" onclick="ps.oralActive=false;ps.oralDone=false;ps.oralResults=[];ps.oralRevealedMap={};renderProjContent();">✕ Interrompi</button>
    </div>
    <div class="test-dots">${dotH}</div>
    <div class="oral-q-card">
      <div class="oral-q-num">Domanda ${ps.oralIdx+1}</div>
      <div class="oral-q-text">${h(q.question)}</div>
      ${!revealed ? `<button class="btn btn-accent" onclick="ps.oralRevealedMap[${ps.oralIdx}]=true;renderProjContent();" style="margin-top:4px;">👁 Mostra risposta suggerita</button>` : ''}
    </div>
    ${revealed ? `
      <div class="oral-reveal">
        <div class="oral-reveal-lbl">Risposta suggerita</div>
        <div class="sugg-text">${h(q.suggestedAnswer||'')}</div>
      </div>
      <div class="sec-label">Come ti sei valutato?</div>
      <div class="rating-row" style="margin-bottom:20px;">
        <span style="font-size:13px;color:var(--text2);">Voto 1–5:</span>
        ${stars}
        <button class="btn btn-accent btn-sm" onclick="saveOralRating()" ${!ps.oralRating?'disabled':''}>Salva e vai avanti</button>
      </div>` : ''}
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn btn-ghost btn-sm" onclick="oralGo(${Math.max(0,ps.oralIdx-1)})" ${ps.oralIdx===0?'disabled':''}>← Prec</button>
      <button class="btn btn-ghost btn-sm" onclick="oralGo(${Math.min(tot-1,ps.oralIdx+1)})" ${ps.oralIdx===tot-1?'disabled':''} style="margin-left:auto;">Succ →</button>
    </div>
    ${ps.oralResults.filter(r=>r?.rating).length===tot ? `<button class="btn btn-accent btn-full" style="margin-top:16px;" onclick="finishOral()">🏁 Termina simulazione</button>` : ''}`;
}

function oralGo(i) { ps.oralIdx=i; ps.oralRating=ps.oralResults[i]?.rating||0; renderProjContent(); }
function setOralRating(n) { ps.oralRating=n; renderProjContent(); }
function saveOralRating() {
  ps.oralResults[ps.oralIdx] = { rating: ps.oralRating };
  const pool = ps._oralPool||[];
  if (ps.oralIdx < pool.length-1) { ps.oralIdx++; ps.oralRating=0; }
  renderProjContent();
}
function finishOral() {
  const pool = ps._oralPool||[];
  const ratings = ps.oralResults.filter(r=>r?.rating).map(r=>r.rating);
  const avg = ratings.length ? ratings.reduce((a,b)=>a+b,0)/ratings.length : 0;
  const voto = Math.round(18+(avg-1)*(12/4));
  const p = proj();
  if(!p.history) p.history=[];
  p.history.push({date:new Date().toISOString(),score:Math.round(avg*10)/10,total:pool.length,percentage:Math.round((avg/5)*100),type:'orale',finalScore:Math.max(0,Math.min(30,voto))});
  save();
  ps.oralDone=true; ps.oralActive=false; ps._oralResults={avg:Math.round(avg*10)/10,voto:Math.max(0,Math.min(30,voto)),n:ratings.length};
  renderProj();
}
function oralResults() {
  const r = ps._oralResults||{};
  const col = r.voto>=28?'var(--success)':r.voto>=24?'var(--primary3)':r.voto>=18?'var(--warn)':'var(--error)';
  return `
    <div class="final-card" style="background:linear-gradient(135deg,var(--accent2)20,var(--surface2));border-color:var(--accent2)55;">
      <div style="font-size:14px;color:#c7d2fe;margin-bottom:8px;font-family:'JetBrains Mono',monospace;letter-spacing:1px;">SIMULAZIONE ORALE</div>
      <div class="final-num" style="color:${col};">${r.voto}<span style="font-size:28px;">/30</span></div>
      <div class="final-sub">Media autovalutazione: ${r.avg}/5 su ${r.n} domande</div>
    </div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px;font-size:14px;color:var(--text2);line-height:1.7;">
      ${r.voto>=28?'🎉 Ottima preparazione! Sei pronto per l\'esame.':r.voto>=24?'👍 Buona preparazione. Ripassare i punti deboli.':r.voto>=18?'📚 Preparazione sufficiente. Continua a studiare.':'⚠ Preparazione insufficiente. Serve più studio.'}
    </div>
    <button class="btn btn-accent btn-full" onclick="ps.oralDone=false;ps.oralActive=false;ps.oralResults=[];ps.oralRevealedMap={};renderProjContent();">🔄 Nuova simulazione</button>`;
}

/* ═══════════════════════════════════════════════
   TAB: TEST COMPLETO
═══════════════════════════════════════════════ */
function tabTest() {
  if(ps.testDone&&ps.testResults) return testResults();
  if(ps.testActive) return testInProgress();
  return testStart();
}
function testStart() {
  const p=proj(),bN=(p.bank||[]).length,oN=(p.openQs||[]).length,ok=bN>=1;
  const qOpts=[10,20,30].map(n=>`<button class="cfg-btn ${ps.testCfgQ===n?'active':''}" onclick="ps.testCfgQ=${n};renderProjContent();">${n}</button>`).join('');
  const tOpts=[15,30,45,60].map(n=>`<button class="cfg-btn ${ps.testCfgT===n?'active':''}" onclick="ps.testCfgT=${n};renderProjContent();">${n} min</button>`).join('');
  const realQ = Math.min(ps.testCfgQ, bN);
  const realO = Math.min(2, oN);
  return `
    <div class="panel-title">Test scritto</div>
    <div class="panel-sub">Simulazione d'esame universitario con crocette e domande aperte</div>
    <div class="test-cfg" style="margin-top:20px;">
      <div class="cfg-opt"><div class="cfg-lbl">Numero domande</div><div class="cfg-btns">${qOpts}</div></div>
      <div class="cfg-opt"><div class="cfg-lbl">Durata</div><div class="cfg-btns">${tOpts}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin:0 0 20px;">
      <div class="stat-chip"><div class="stat-v">${realQ}</div><div class="stat-l">crocette</div></div>
      <div class="stat-chip"><div class="stat-v">${realO}</div><div class="stat-l">dom. aperte</div></div>
      <div class="stat-chip"><div class="stat-v">${ps.testCfgT}:00</div><div class="stat-l">minuti</div></div>
    </div>
    ${!ok?`<div class="err-box" style="margin-bottom:16px;">Aggiungi almeno 1 domanda alla banca prima di iniziare il test</div>`:''}
    <button class="btn btn-primary btn-full" onclick="startTest()" ${!ok?'disabled':''} style="font-size:16px;padding:15px;">▶ Inizia test</button>`;
}

function startTest() {
  const p=proj();
  const bank=shuffle([...(p.bank||[])]).slice(0,ps.testCfgQ).map(q=>({...q,type:'mcq'}));
  const opens=shuffle([...(p.openQs||[])]).slice(0,2).map(q=>({...q,type:'open'}));
  ps.testQs=[...bank,...opens]; ps.testIdx=0;
  ps.tAns={};ps.tOpenTxt={};ps.tOpenRating={};ps.tShowSugg={};
  ps.testActive=true;ps.testDone=false;ps.testResults=null;ps.timerSec=ps.testCfgT*60;
  killTimer();
  ps.timerRef=setInterval(()=>{
    ps.timerSec--;
    const el=document.getElementById('testTimer');
    if(el){el.textContent=`${pad(Math.floor(ps.timerSec/60))}:${pad(ps.timerSec%60)}`;
      el.className='timer'+(ps.timerSec<=60?' danger':ps.timerSec<=300?' warn':'');}
    if(ps.timerSec<=0){killTimer();finishTest();}
  },1000);
  renderProjContent();
}
function killTimer(){ if(ps.timerRef){clearInterval(ps.timerRef);ps.timerRef=null;} }
function pad(n){ return String(n).padStart(2,'0'); }

function testInProgress() {
  const qs=ps.testQs,q=qs[ps.testIdx],tot=qs.length;
  const m=Math.floor(ps.timerSec/60),s=ps.timerSec%60;
  const tc='timer'+(ps.timerSec<=60?' danger':ps.timerSec<=300?' warn':'');
  const dotH=qs.map((qd,i)=>{
    const isO=qd.type==='open',ans=isO?(ps.tOpenTxt[i]||'').trim().length>0:ps.tAns[i]!==undefined;
    return `<button class="tdot${isO?' oq':''}${ans?' ans':''}${i===ps.testIdx?' curr':''}" onclick="tGo(${i})">${i+1}</button>`;
  }).join('');
  let qH='';
  if(q.type==='mcq'){
    const opts=q.options.map((o,oi)=>`<button class="opt ${ps.tAns[ps.testIdx]===oi?'sel':''}" onclick="tMCQ(${oi})"><span class="opt-letter">${['A','B','C','D'][oi]}</span>${h(o)}</button>`).join('');
    qH=`<div class="quiz-block"><div class="quiz-q">${h(q.question)}</div>${opts}</div>`;
  } else {
    const showS=ps.tShowSugg[ps.testIdx];
    const ratings=[1,2,3,4,5].map(n=>`<button class="r-star ${ps.tOpenRating[ps.testIdx]===n?'sel':''}" onclick="tOR(${n})">${n}</button>`).join('');
    qH=`<div class="quiz-block">
      <div class="quiz-q" style="color:#c7d2fe;">✍️ Domanda aperta</div>
      <div class="quiz-q">${h(q.question)}</div>
      <textarea class="open-ans" placeholder="Scrivi la tua risposta..." oninput="ps.tOpenTxt[${ps.testIdx}]=this.value">${h(ps.tOpenTxt[ps.testIdx]||'')}</textarea>
      ${showS?`<div class="sugg-box"><div class="sugg-lbl">Risposta suggerita</div><div class="sugg-text">${h(q.suggestedAnswer)}</div></div>
        <div class="rating-row"><span style="font-size:13px;color:var(--text2);">Voto:</span>${ratings}</div>`
      :`<button class="btn btn-ghost btn-sm" onclick="tShowS(${ps.testIdx})">👁 Mostra risposta suggerita</button>`}
    </div>`;
  }
  const mcqTot=qs.filter(q=>q.type==='mcq').length,ansMCQ=Object.keys(ps.tAns).length;
  const openIdxs=qs.map((q,i)=>q.type==='open'?i:null).filter(i=>i!==null);
  const openTot=openIdxs.length,ansOpen=openIdxs.filter(i=>(ps.tOpenTxt[i]||'').trim()).length;
  return `
    <div class="test-hdr">
      <div id="testTimer" class="${tc}">${pad(m)}:${pad(s)}</div>
      <div class="test-prog">${ps.testIdx+1} / ${tot}</div>
      <button class="btn btn-primary btn-sm" onclick="confirmFinish(${ansMCQ},${mcqTot},${ansOpen},${openTot})">Termina test (${ansMCQ+ansOpen}/${tot})</button>
    </div>
    <div class="test-dots">${dotH}</div>
    ${qH}
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn btn-ghost btn-sm" onclick="tGo(${Math.max(0,ps.testIdx-1)})" ${ps.testIdx===0?'disabled':''}>← Prec</button>
      <button class="btn btn-ghost btn-sm" onclick="tGo(${Math.min(tot-1,ps.testIdx+1)})" ${ps.testIdx===tot-1?'disabled':''} style="margin-left:auto;">Succ →</button>
    </div>`;
}
function tGo(i)    { ps.testIdx=i;renderProjContent(); }
function tMCQ(oi)  { ps.tAns[ps.testIdx]=oi;renderProjContent(); }
function tShowS(i) { ps.tShowSugg[i]=true;renderProjContent(); }
function tOR(n)    { ps.tOpenRating[ps.testIdx]=n;renderProjContent(); }

function confirmFinish(ansMCQ,mcqTot,ansOpen,openTot) {
  const tot=mcqTot+openTot, ans=ansMCQ+ansOpen;
  if(ans<tot) {
    modal('Termina test?', `
      <p style="color:var(--text2);margin-bottom:18px;">Hai risposto a <strong style="color:var(--text);">${ans}/${tot}</strong> domande. Le domande senza risposta verranno conteggiate come errate.</p>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button class="btn btn-ghost btn-sm" onclick="closeModal()">Continua il test</button>
        <button class="btn btn-primary btn-sm" onclick="closeModal();finishTest()">Termina comunque</button>
      </div>`);
  } else { finishTest(); }
}
function finishTest() {
  killTimer(); const p=proj(),qs=ps.testQs;
  const mcqQs=qs.map((q,i)=>q.type==='mcq'?{q,i}:null).filter(Boolean);
  const openQs=qs.map((q,i)=>q.type==='open'?{q,i}:null).filter(Boolean);
  let correct=0; const errors=[];
  mcqQs.forEach(({q,i})=>{
    const bq=p.bank?.find(b=>b.id===q.id);
    if(ps.tAns[i]===q.correct){correct++;if(bq){bq.timesAns++;bq.timesOk++;}}
    else{if(bq)bq.timesAns++;errors.push({question:q.question,correct:q.options[q.correct],yours:ps.tAns[i]!=null?q.options[ps.tAns[i]]:null});}
  });
  const avgOpen=openQs.length?openQs.map(({i})=>ps.tOpenRating[i]||0).reduce((a,b)=>a+b,0)/openQs.length:0;
  const pct=mcqQs.length?Math.round(correct/mcqQs.length*100):0;
  const finalScore=Math.min(30,Math.round((mcqQs.length?(correct/mcqQs.length)*27:0)+(avgOpen/5)*3));
  if(!p.history) p.history=[];
  p.history.push({date:new Date().toISOString(),score:correct,total:mcqQs.length,percentage:pct,type:'scritto',finalScore});
  save();
  ps.testResults={correct,totalMCQ:mcqQs.length,errors,avgOpen:Math.round(avgOpen*10)/10,finalScore,pct};
  ps.testDone=true;ps.testActive=false;
  renderProj();
}
function testResults() {
  const r=ps.testResults;
  const errH=r.errors.map(e=>`<div class="err-item"><div class="err-q">${h(e.question)}</div>
    <div class="err-ok">✅ ${h(e.correct)}</div>${e.yours?`<div style="color:#fca5a5;font-size:12px;margin-top:3px;">✗ ${h(e.yours)}</div>`:''}</div>`).join('');
  return `
    <div class="final-card">
      <div class="final-num">${r.finalScore}<span style="font-size:28px;">/30</span></div>
      <div class="final-sub">${r.correct}/${r.totalMCQ} crocette · Media aperte: ${r.avgOpen}/5</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;">
      <div class="stat-chip"><div class="stat-v">${r.pct}%</div><div class="stat-l">esattezza</div></div>
      <div class="stat-chip"><div class="stat-v">${r.correct}</div><div class="stat-l">corrette</div></div>
      <div class="stat-chip"><div class="stat-v" style="color:var(--error);">${r.totalMCQ-r.correct}</div><div class="stat-l">errori</div></div>
    </div>
    ${r.errors.length?`<div class="sec-label">Errori (${r.errors.length})</div>${errH}`:''}
    <button class="btn btn-ghost btn-full" style="margin-top:16px;" onclick="ps.testDone=false;ps.testResults=null;ps.testActive=false;renderProj();">🔄 Nuovo test</button>`;
}

/* ═══════════════════════════════════════════════
   TAB: PROGRESSI
═══════════════════════════════════════════════ */
function tabProg() {
  const p=proj(),hist=p.history||[];
  if(!hist.length) return `<div class="panel-title">Progressi</div>${empty('📈','Completa almeno un test per vedere i progressi')}`;
  const pcts=hist.map(e=>e.percentage);
  const avg=Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length),best=Math.max(...pcts);
  const trend=pcts.length>=2?(pcts[pcts.length-1]>pcts[pcts.length-2]?'↑':pcts[pcts.length-1]<pcts[pcts.length-2]?'↓':'→'):'→';
  const tc=trend==='↑'?'var(--success)':trend==='↓'?'var(--warn)':'var(--primary3)';
  const lc=trend==='↓'?'#f59e0b':'#14b8a6';
  const chart=hist.length>=2?lineChart(hist,lc):'';
  const table=hist.slice().reverse().map(e=>`
    <div style="display:flex;gap:12px;align-items:center;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;font-family:'JetBrains Mono',monospace;font-size:12px;">
      <span style="color:var(--text2);flex:1;">${e.date.slice(0,10)}</span>
      <span style="color:var(--text2);">${e.score}/${e.total}</span>
      <span style="font-weight:700;color:var(--text);">${e.percentage}%</span>
      ${e.finalScore!=null?`<span style="color:var(--primary3);background:var(--primary2)22;border-radius:4px;padding:1px 7px;">${e.finalScore}/30</span>`:''}
      <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);background:var(--surface3);border-radius:4px;padding:1px 6px;">${e.type==='orale'?'🎤 orale':'📝 scritto'}</span>
    </div>`).join('');
  return `
    <div class="panel-title">Progressi</div>
    <div class="panel-sub">${hist.length} test completati</div>
    <div class="prog-grid">
      <div class="prog-cell"><div class="prog-v">${avg}%</div><div class="prog-l">Media</div></div>
      <div class="prog-cell"><div class="prog-v">${best}%</div><div class="prog-l">Miglior risultato</div></div>
      <div class="prog-cell"><div class="prog-v">${hist.length}</div><div class="prog-l">Test completati</div></div>
      <div class="prog-cell"><div class="prog-v" style="color:${tc};">${trend}</div><div class="prog-l">Trend</div></div>
    </div>
    ${chart}
    <div class="sec-label" style="margin-top:20px;">Storico test</div>
    ${table}`;
}
function lineChart(hist,lc) {
  const W=580,H=130,px=34,py=18;
  const pts=hist.map((e,i)=>({x:px+(i/(hist.length-1))*(W-px*2),y:H-py-(e.percentage/100)*(H-py*2)}));
  const line=pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
  const area=`M${pts[0].x},${H-py} `+pts.map(p=>`L${p.x},${p.y}`).join(' ')+` L${pts[pts.length-1].x},${H-py} Z`;
  const grid=[0,25,50,75,100].map(v=>{const y=H-py-(v/100)*(H-py*2);return`<line x1="${px}" y1="${y}" x2="${W-px}" y2="${y}" stroke="var(--border)" stroke-width="0.5"/><text x="${px-5}" y="${y+3}" text-anchor="end" fill="var(--text3)" font-size="8" font-family="JetBrains Mono,monospace">${v}</text>`;}).join('');
  return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" style="width:100%;max-height:150px;background:var(--surface2);border-radius:var(--radius-sm);">
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${lc}" stop-opacity="0.25"/><stop offset="100%" stop-color="${lc}" stop-opacity="0"/></linearGradient></defs>
    ${grid}<path d="${area}" fill="url(#ag)"/><path d="${line}" fill="none" stroke="${lc}" stroke-width="2.5"/>
    ${pts.map((p,i)=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="${lc}"/>`).join('')}
    ${pts.map((p,i)=>`<text x="${p.x}" y="${p.y-10}" text-anchor="middle" fill="${lc}" font-size="9" font-family="JetBrains Mono,monospace">${hist[i].percentage}%</text>`).join('')}
  </svg></div>`;
}

function modal(title,body){ document.getElementById('modalTitle').textContent=title; document.getElementById('modalBody').innerHTML=body; document.getElementById('modal').classList.add('on'); }
function closeModal()     { document.getElementById('modal').classList.remove('on'); }
document.getElementById('modal').addEventListener('click',e=>{ if(e.target.id==='modal') closeModal(); });

/* ═══════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════ */
function h(s)    { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function x(s)    { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function empty(icon,msg){ return `<div class="empty-state"><div class="ei">${icon}</div><p>${msg}</p></div>`; }
function emptyTab(){ return `<div class="panel-title">Sezione</div>${empty('🔧','Sezione non disponibile')}`; }
function uid()   { return crypto.randomUUID(); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

(function init(){
  loadAll();
  const saved=localStorage.getItem('studyai_key');
  const gk=document.getElementById('apiKeyGlobal');
  if(saved) gk.value=saved;
  gk.addEventListener('input',e=>localStorage.setItem('studyai_key',e.target.value));
  renderProjects();
})();
</script>
